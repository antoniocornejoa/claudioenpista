// Upload de imagen de sticker a Supabase Storage. Devuelve la public URL.
async function dbUploadStickerImage(file, stickerId){
  if (!file) throw new Error('no file');
  const ext = (file.name.split('.').pop() || 'png').toLowerCase().replace(/[^a-z0-9]/g,'');
  const path = `${stickerId || 'tmp'}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
  const { error: upErr } = await sb.storage.from('stickers').upload(path, file, {
    cacheControl: '3600', upsert: false, contentType: file.type || 'image/png'
  });
  if (upErr) throw upErr;
  const { data } = sb.storage.from('stickers').getPublicUrl(path);
  return data.publicUrl;
}
async function dbDeleteStickerImage(url){
  // url tipo https://xxx.supabase.co/storage/v1/object/public/stickers/{path}

}

// Compresion client-side: redimensiona a max 1200px y exporta WebP quality 0.9
// Reduce drasticamente el tamaño antes de subir. SVG y GIF (animado) se dejan tal cual.
async function compressImage(file, maxDim = 1200, quality = 0.9){
  if (!file) return file;
  // No tocar SVG (vector) ni GIF (puede ser animado)
  if (file.type === 'image/svg+xml' || file.type === 'image/gif') return file;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        const ratio = Math.min(1, maxDim / Math.max(width, height));
        width = Math.round(width * ratio);
        height = Math.round(height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        // fondo transparente preservado solo en PNG/WEBP
        ctx.drawImage(img, 0, 0, width, height);
        // si era PNG con transparencia, mantener PNG; sino WebP
        const outType = (file.type === 'image/png') ? 'image/webp' : 'image/webp';
        canvas.toBlob((blob) => {
          if (!blob) return reject(new Error('La compresión falló'));
          // Si por algun caso el comprimido pesa mas que el original, devolver el original
          if (blob.size >= file.size) return resolve(file);
          const ext = outType === 'image/webp' ? 'webp' : 'jpg';
          const newName = (file.name||'image').replace(/\.[^.]+$/, '') + '.' + ext;
          resolve(new File([blob], newName, { type: outType }));
        }, outType, quality);
      };
      img.onerror = () => reject(new Error('No se pudo decodificar la imagen'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
    reader.readAsDataURL(file);
  });
}

// ===== Calculo de precio por packs (programacion dinamica) =====
// Mismo algoritmo que la funcion SQL calc_pack_price (DP, optimal pack combination).
function calcPackPrice(qty, config){
  if (!qty || qty <= 0) return 0;
  const cfg = config && config.packs ? config : DEFAULT_PACKS_PRICING;
  const packs = cfg.packs || [];
  const extra = cfg.extra_price || 3000;
  const dp = new Array(qty + 1).fill(Infinity);
  dp[0] = 0;
  for (let n = 1; n <= qty; n++){
    if (dp[n-1] !== Infinity) dp[n] = Math.min(dp[n], dp[n-1] + extra);
    for (const p of packs){
      if (p.n <= n && dp[n-p.n] !== Infinity){
        dp[n] = Math.min(dp[n], dp[n-p.n] + p.price);
      }
    }
  }
  return dp[qty] === Infinity ? qty * (cfg.extra_price||3000) : dp[qty];
}

  // ===== REAR WING =====
  // soportes
  [.3,-.3].forEach(z => {
    const sup = new THREE.Mesh(new THREE.BoxGeometry(.05,.7,.06), carbon);
    sup.position.set(-1.95,1.05,z); car.add(sup);
  });
  // ala principal
  const rwMain = new THREE.Mesh(new THREE.BoxGeometry(.18,.06,1.4), orange);
  rwMain.position.set(-1.95,1.32,0); car.add(rwMain);
  // segundo ala (DRS)
  const rwTop = new THREE.Mesh(new THREE.BoxGeometry(.12,.04,1.35), orangeDark);
  rwTop.position.set(-2.0,1.42,0); car.add(rwTop);
  // endplates traseros
  [.7,-.7].forEach(z => {
    const ep = new THREE.Mesh(new THREE.BoxGeometry(.35,.45,.04), carbon);
    ep.position.set(-2.0,1.25,z); car.add(ep);
  });
  // luz de lluvia trasera
  const rainLight = new THREE.Mesh(new THREE.BoxGeometry(.08,.08,.12), redLight);
  rainLight.position.set(-2.05,1.15,0); car.add(rainLight);

  // ===== ESCAPE =====
  const exhaust = new THREE.Mesh(new THREE.CylinderGeometry(.07,.09,.2,12), carbon);
  exhaust.rotation.z = Math.PI/2; exhaust.position.set(-2.1,.85,0); car.add(exhaust);

  // ===== DIFUSOR =====
  const diff = new THREE.Mesh(new THREE.BoxGeometry(.4,.18,1.0), carbon);
  diff.position.set(-1.95,.3,0); car.add(diff);

  // ===== RUEDAS (con neumático + llanta + brake duct) =====
  function makeWheel(){
    const g = new THREE.Group();
    // neumático
    const tire = new THREE.Mesh(new THREE.CylinderGeometry(.5,.5,.42,32), tireMat);
    tire.rotation.x = Math.PI/2;
    g.add(tire);
    // llanta
    const rim = new THREE.Mesh(new THREE.CylinderGeometry(.32,.32,.43,24), rimMat);
    rim.rotation.x = Math.PI/2;
    g.add(rim);
    // centro
    const hub = new THREE.Mesh(new THREE.CylinderGeometry(.08,.08,.46,12), orange);
    hub.rotation.x = Math.PI/2;
    g.add(hub);
    // radios
    for (let i=0;i<5;i++){
      const spoke = new THREE.Mesh(new THREE.BoxGeometry(.55,.04,.06), carbon);
      spoke.rotation.x = (i/5)*Math.PI*2;
      g.add(spoke);
    }
    return g;
  }
  const wheels = [];
  [[1.55,.5,.95],[1.55,.5,-.95],[-1.45,.5,.95],[-1.45,.5,-.95]].forEach(([x,y,z])=>{
    const w = makeWheel();
    w.position.set(x,y,z);
    car.add(w);
    wheels.push(w);
  });

  // ===== SUSPENSIÓN (brazos visibles) =====
  [[1.55,.95],[1.55,-.95],[-1.45,.95],[-1.45,-.95]].forEach(([x,z]) => {
    const arm = new THREE.Mesh(new THREE.CylinderGeometry(.025,.025,.55,6), carbon);
    arm.rotation.x = Math.PI/2;
    arm.position.set(x,.5,z*.55);
    car.add(arm);
  });

  // ===== PISO REFLECTANTE para que no flote =====
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(40,40),
    new THREE.MeshStandardMaterial({ color:0x050505, metalness:.7, roughness:.4 })
  );
  floor.rotation.x = -Math.PI/2;
  floor.position.y = -.05;
  scene.add(floor);

  // sombra debajo del auto (disco oscuro)
  const shadow = new THREE.Mesh(
    new THREE.CircleGeometry(2.5,32),
    new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:.6 })
  );
  shadow.rotation.x = -Math.PI/2;
  shadow.position.y = -.04;
  scene.add(shadow);

  car.rotation.y = -.4;
  scene.add(car);

  // exponer wheels al loop para girarlas
  car.userData.wheels = wheels;

  // lights
  scene.add(new THREE.AmbientLight(0xffffff,.35));
  const key = new THREE.DirectionalLight(0xff8a3d,2.2); key.position.set(4,5,5); scene.add(key);
  const rim = new THREE.DirectionalLight(0x66aaff,1.2); rim.position.set(-5,3,-2); scene.add(rim);
  const pt = new THREE.PointLight(0xff6a00,3,12); pt.position.set(0,2,3); scene.add(pt);

  // particles
  const pgeo = new THREE.BufferGeometry();
  const pcount = 400;
  const pos = new Float32Array(pcount*3);
  for (let i=0;i<pcount;i++){ pos[i*3]= (Math.random()-.5)*30; pos[i*3+1]=(Math.random()-.5)*15; pos[i*3+2]=(Math.random()-.5)*20; }
  pgeo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const particles = new THREE.Points(pgeo, new THREE.PointsMaterial({ color:0xff6a00, size:.025, transparent:true, opacity:.6 }));
  scene.add(particles);

  function resize(){ renderer.setSize(innerWidth,innerHeight); camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); }
  resize(); addEventListener('resize',resize);

  let scrollY = 0;
  lenis.on('scroll', ({scroll}) => { scrollY = scroll; });

  function render(t){
    car.rotation.y = -.4 + Math.sin(t*.0004)*.4 + scrollY*.002;
    car.position.y = .05 + Math.sin(t*.001)*.08;
    if (car.userData.wheels) car.userData.wheels.forEach(w => w.rotation.x = t*.005);
    particles.rotation.y = t*.00005;
    camera.position.x = Math.sin(t*.0003)*.4;
    camera.lookAt(0,.6,0);
    renderer.render(scene,camera);
    requestAnimationFrame(render);
  }
  render(0);
})();

/* ============== HOOKS ============== */
function useTilt(){
  const ref = useRef(null);
  useEffect(()=>{
    const el = ref.current; if (!el) return;
    function move(e){
      const r = el.getBoundingClientRect();
      const x = (e.clientX - r.left)/r.width - .5;
      const y = (e.clientY - r.top)/r.height - .5;
      el.style.transform = `perspective(900px) rotateY(${x*14}deg) rotateX(${-y*14}deg) translateZ(0)`;
    }
    function leave(){ el.style.transform = 'perspective(900px) rotateY(0) rotateX(0)'; }
    el.addEventListener('mousemove',move); el.addEventListener('mouseleave',leave);
    return ()=>{ el.removeEventListener('mousemove',move); el.removeEventListener('mouseleave',leave); };
  },[]);
  return ref;
}

function Counter({ to, duration=2, suffix='' }){
  const [v,setV] = useState(0);
  const ref = useRef(null);
  useEffect(()=>{
    const obs = new IntersectionObserver(([e])=>{
      if (e.isIntersecting){
        const c = animate(0,to,{ duration, ease:'easeOut', onUpdate:val=>setV(Math.floor(val)) });
        obs.disconnect();
        return ()=>c.stop();
      }
    },{threshold:.4});
    if (ref.current) obs.observe(ref.current);
    return ()=>obs.disconnect();
  },[to]);
  return html`<span ref=${ref}>${v.toLocaleString('es-CL')}${suffix}</span>`;
}

// ===== RUT chileno: formato automatico y validacion del digito verificador =====
function rutCleanRaw(s){ return String(s||'').replace(/[^0-9kK]/g,'').toUpperCase(); }
function rutFormat(s){
  // Acepta input raw o ya formateado, devuelve "12.345.678-9"
  const c = rutCleanRaw(s);
  if (c.length === 0) return '';
  if (c.length === 1) return c; // a un solo char no agregamos guion todavia
  const body = c.slice(0,-1);
  const dv = c.slice(-1);
  // miles cada 3 desde la derecha
  const bodyDot = body.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return `${bodyDot}-${dv}`;
}
function rutCalculateDV(body){
  let sum = 0, mul = 2;
  for (let i = body.length-1; i >= 0; i--){ sum += parseInt(body[i],10)*mul; mul = mul===7?2:mul+1; }
  const r = 11 - (sum % 11);
  return r === 11 ? '0' : r === 10 ? 'K' : String(r);
}
function validateRUT(rut){
  const clean = rutCleanRaw(rut);
  if (clean.length < 8 || clean.length > 9) return false; // RUT chileno: 7-8 digits + DV
  const body = clean.slice(0,-1), dv = clean.slice(-1);
  if (!/^\d+$/.test(body)) return false;
  return dv === rutCalculateDV(body);
}

function lsLoad(key, fallback){
  try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch(e){ console.warn('lsLoad failed', key, e); return fallback; }
}
function lsSave(key, value){
  try { localStorage.setItem(key, JSON.stringify(value)); }
  catch(e){ console.warn('lsSave failed', key, e); }
}

function migrateSorteos(arr){
  if (!Array.isArray(arr) || arr.length === 0) return DEFAULT_SORTEOS;
  const fb = DEFAULT_SORTEOS[0];
  return arr.map(s => ({
    id: s.id || Date.now(),
    title: s.title || 'Sorteo',
    prize: s.prize || '',
    start: s.start || '',
    end: s.end || '',
    active: !!s.active,
    status: s.status || 'activo',
    heroCards: Array.isArray(s.heroCards) && s.heroCards.length ? s.heroCards : fb.heroCards,
    prizes:    Array.isArray(s.prizes)    && s.prizes.length    ? s.prizes    : fb.prizes,
    bases:     Array.isArray(s.bases)     && s.bases.length     ? s.bases     : fb.bases,
  }));
}

  function showToast(msg, type='ok'){
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, msg, type }]);
    setTimeout(()=>setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  }
  function setBusy(key, busy){
    setBusyKeys(prev => { const n = new Set(prev); if (busy) n.add(key); else n.delete(key); return n; });
  }
  const isBusy = (key) => busyKeys.has(key);

  // Detectar retorno de Stripe Checkout via query params
  useEffect(()=>{
    const p = new URLSearchParams(window.location.search);
    const result = p.get('checkout');
    const compraId = p.get('compra');
    if (result === 'ok' || result === 'cancel'){
      setCheckoutResult(result);
      setCheckoutCompraId(compraId);
      // limpiar URL para no re-mostrar al recargar
      const url = new URL(window.location.href);
      url.searchParams.delete('checkout');
      url.searchParams.delete('compra');
      url.searchParams.delete('session');
      window.history.replaceState({}, '', url.toString());
    }
  }, []);
  // state arranca con cache de localStorage para render inmediato; despues hidrata del DB
  const [sorteos,setSorteos] = useState(() => migrateSorteos(lsLoad(LS_KEY_SORTEOS, DEFAULT_SORTEOS)));
  const [stickersList,setStickersList] = useState(() => {
    const loaded = lsLoad(LS_KEY_STICKERS, DEFAULT_STICKERS);
    return Array.isArray(loaded) && loaded.length ? loaded : DEFAULT_STICKERS;
  });
  const [dbReady,setDbReady] = useState(false);
  const [dbError,setDbError] = useState(null);

  // hidratar del DB al montar
  useEffect(()=>{
    let cancelled = false;
    (async ()=>{
      try {
        const [s, st] = await Promise.all([dbFetchSorteos(), dbFetchStickers()]);
        if (cancelled) return;
        if (s.length) setSorteos(s);
        if (st.length) setStickersList(st);
        setDbReady(true);
      } catch(e){
        console.warn('DB hydration failed, using localStorage cache', e);
        if (!cancelled) setDbError(e.message || String(e));
      }
    })();
    return ()=>{ cancelled = true; };
  }, []);

  // cache persistente en localStorage como fallback offline
  useEffect(()=>{ lsSave(LS_KEY_SORTEOS, sorteos); }, [sorteos]);
  useEffect(()=>{ lsSave(LS_KEY_STICKERS, stickersList); }, [stickersList]);

  // ====== mutaciones admin (DB + state) ======
  async function refreshSorteos(){
    try { setSorteos(await dbFetchSorteos()); showToast('✓ Sorteos recargados'); }
    catch(e){ showToast('Error al recargar sorteos: '+e.message, 'err'); }
  }
  async function refreshStickers(){
    try { setStickersList(await dbFetchStickers()); showToast('✓ Stickers recargados'); }
    catch(e){ showToast('Error al recargar stickers: '+e.message, 'err'); }
  }
  function patchSorteoLocal(idx, patch){
    setSorteos(prev => prev.map((s,i)=> i===idx ? {...s, ...patch} : s));
  }
  function patchStickerLocal(idx, patch){
    setStickersList(prev => prev.map((s,i)=> i===idx ? {...s, ...patch} : s));
  }
  async function saveSorteoAt(idx){
    const s = sorteos[idx]; if (!s) return;
    const key = 'sorteo:'+(s.id||'new'); setBusy(key, true);
    try {
      const saved = await dbUpsertSorteo(s);
      setSorteos(prev => prev.map((x,i)=> i===idx ? saved : x));
      showToast(`✓ Sorteo "${saved.title}" guardado`);
    } catch(e){ showToast('Error al guardar: '+e.message, 'err'); }
    setBusy(key, false);
  }
  async function addSorteo(){
    setBusy('sorteo-add', true);
    const tpl = {
      title:'Nuevo sorteo', prize:'', start:'', end:'', active:false, status:'activo',
      heroCards:[{title:'CARD 1',desc:'Descripción',color1:'#ff6a00',color2:'#dc2626'}],
      prizes:[{t:'PREMIO 1',d:'Descripción'}],
      bases:[{label:'Organizador',value:'Claudio en Pista'}]
    };
    try { const saved = await dbUpsertSorteo(tpl); setSorteos(prev => [...prev, saved]); showToast('✓ Sorteo creado'); }
    catch(e){ showToast('Error al crear sorteo: '+e.message, 'err'); }
    setBusy('sorteo-add', false);
  }
  async function deleteSorteoById(id){
    setBusy('sorteo-del:'+id, true);
    try { await dbDeleteSorteo(id); setSorteos(prev => prev.filter(s => s.id !== id)); showToast('✓ Sorteo eliminado'); }
    catch(e){ showToast('Error al borrar sorteo: '+e.message, 'err'); }
    setBusy('sorteo-del:'+id, false);
  }
  async function saveStickerAt(idx){
    const s = stickersList[idx]; if (!s) return;
    const key = 'sticker:'+(s.id||'new'); setBusy(key, true);
    try {
      const saved = await dbUpsertSticker(s);
      setStickersList(prev => prev.map((x,i)=> i===idx ? saved : x));
      showToast(`✓ Sticker "${saved.name}" guardado`);
    } catch(e){ showToast('Error al guardar: '+e.message, 'err'); }
    setBusy(key, false);
  }
  async function addSticker(){
    setBusy('sticker-add', true);
    const tpl = { name:'NUEVO STICKER', price:1000, emoji:'🆕', desc:'', sorteoId: (sorteos.find(x=>x.active)?.id) || null, position:(stickersList.length+1)*10 };
    try { const saved = await dbUpsertSticker(tpl); setStickersList(prev => [...prev, saved]); showToast('✓ Sticker creado'); }
    catch(e){ showToast('Error al crear sticker: '+e.message, 'err'); }
    setBusy('sticker-add', false);
  }
  async function deleteStickerById(id){
    setBusy('sticker-del:'+id, true);
    try { await dbDeleteSticker(id); setStickersList(prev => prev.filter(s => s.id !== id)); showToast('✓ Sticker eliminado'); }
    catch(e){ showToast('Error al borrar sticker: '+e.message, 'err'); }
    setBusy('sticker-del:'+id, false);
  }
  const cartCount = Object.values(cart).reduce((a,b)=>a+b,0);
  const add = id => setCart(c=>({...c,[id]:(c[id]||0)+1}));
  const sub = id => setCart(c=>{ const n={...c}; n[id]=(n[id]||0)-1; if(n[id]<=0)delete n[id]; return n; });
  const toggle = id => setCart(c=>{ const n={...c}; if (n[id]) delete n[id]; else n[id]=1; return n; });
  const goto = t => { ScrollTrigger.getAll().forEach(st=>st.kill()); lenis.stop(); setTab(t); setTimeout(()=>{window.scrollTo({top:0,behavior:'instant'});lenis.start();},50); };

  const activeSorteo = sorteos.find(s=>s.active && s.status!=='bloqueado');
  const heroCards = activeSorteo && activeSorteo.heroCards;

  return html`
    <${React.Fragment}>
      <${Nav} tab=${tab} setTab=${goto} cartCount=${cartCount} openCart=${()=>setCartOpen(true)} openAdmin=${()=>setAdminOpen(true)}/>
      ${tab==='home' && html`
        <${React.Fragment}>
          <${Hero} goto=${goto}/>
          <${Marquee}/>
          <${HorizontalGallery} goto=${goto} heroCards=${heroCards}/>
          <${Sorteo} goto=${goto} sorteos=${sorteos}/>
        </${React.Fragment}>
      `}
      ${tab==='sorteo' && html`<div class="pt-24"><div class="px-6 pt-6"><button onClick=${()=>goto('home')} class="flex items-center gap-2 text-sm tracking-widest text-neutral-400 hover:text-brand transition-colors uppercase cursor-pointer">\u2190 VOLVER A INICIO</button></div><${Sorteo} goto=${goto} sorteos=${sorteos}/></div>`}
      ${tab==='stickers' && html`<div class="pt-24"><div class="px-6 pt-6"><button onClick=${()=>goto('home')} class="flex items-center gap-2 text-sm tracking-widest text-neutral-400 hover:text-brand transition-colors uppercase cursor-pointer">\u2190 VOLVER A INICIO</button></div><${Stickers} cart=${cart} toggle=${toggle} openCart=${()=>setCartOpen(true)} stickersList=${stickersList} activeSorteo=${activeSorteo}/></div>`}

      <footer class="border-t border-white/10 mt-20 py-10 text-center">
        <div class="display text-2xl text-brand">CLAUDIO EN PISTA</div>
        <div class="text-xs tracking-[0.3em] text-neutral-600 mt-2">© 2026 · DEMO PREMIUM · STRIPE SANDBOX</div>
      </footer>

      <${CartDrawer} open=${cartOpen} close=${()=>setCartOpen(false)} cart=${cart} toggle=${toggle} sub=${sub} stickersList=${stickersList} activeSorteo=${activeSorteo}/>

      ${checkoutResult && html`
        <div class="fixed inset-0 z-[70] bg-black/90 backdrop-blur flex items-center justify-center p-6" onClick=${()=>setCheckoutResult(null)}>
          <${motion.div} initial=${{scale:.7,opacity:0}} animate=${{scale:1,opacity:1}}
            class="max-w-md w-full border border-brand/40 rounded-3xl bg-neutral-950 p-10 text-center neon-border" onClick=${e=>e.stopPropagation()}>
            ${checkoutResult==='ok' ? html`
              <${motion.div} initial=${{scale:0}} animate=${{scale:1}} transition=${{type:'spring',stiffness:200}}
                class="w-20 h-20 bg-brand rounded-full flex items-center justify-center mx-auto text-4xl text-black">✓</${motion.div}>
              <div class="display text-3xl mt-6">PAGO EXITOSO</div>
              <p class="text-neutral-400 mt-3 text-sm">Recibimos tu pago. Te enviaremos un email con tus números de participación en los próximos minutos.</p>
              ${checkoutCompraId && html`<div class="text-[10px] tracking-widest text-neutral-600 mt-4">COMPRA #${checkoutCompraId}</div>`}
              <button onClick=${()=>setCheckoutResult(null)} class="mt-8 px-8 py-3 bg-brand text-black display tracking-widest rounded-full hover-glow">CERRAR</button>
            ` : html`
              <div class="w-20 h-20 border-2 border-neutral-500 rounded-full flex items-center justify-center mx-auto text-4xl text-neutral-500">✕</div>
              <div class="display text-3xl mt-6">PAGO CANCELADO</div>
              <p class="text-neutral-400 mt-3 text-sm">No procesamos ningún cobro. Podés volver a intentarlo cuando quieras.</p>
              <button onClick=${()=>setCheckoutResult(null)} class="mt-8 px-8 py-3 border border-white/20 hover:border-brand display tracking-widest rounded-full">VOLVER AL SITIO</button>
            `}
          </${motion.div}>
        </div>
      `}
      <${Admin} open=${adminOpen} close=${()=>setAdminOpen(false)}
        sorteos=${sorteos} stickersList=${stickersList}
        patchSorteoLocal=${patchSorteoLocal} saveSorteoAt=${saveSorteoAt} addSorteo=${addSorteo} deleteSorteoById=${deleteSorteoById}
        patchStickerLocal=${patchStickerLocal} saveStickerAt=${saveStickerAt} addSticker=${addSticker} deleteStickerById=${deleteStickerById}
        refreshSorteos=${refreshSorteos} refreshStickers=${refreshStickers}
        dbReady=${dbReady} dbError=${dbError} isBusy=${isBusy} showToast=${showToast}/>

      <${AnimatePresence}>
        ${toasts.map(t => html`
          <${motion.div} key=${t.id}
            initial=${{opacity:0, y:20, scale:.9}} animate=${{opacity:1, y:0, scale:1}} exit=${{opacity:0, y:-10, scale:.95}}
            transition=${{type:'spring', stiffness:400, damping:25}}
            class=${"fixed left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full backdrop-blur-md border display tracking-widest text-sm shadow-2xl "+(t.type==='err'?'bg-red-950/80 border-red-500/60 text-red-200':'bg-green-950/80 border-green-500/60 text-green-100')}
            style=${{ top: `${20 + toasts.indexOf(t)*60}px` }}>
            ${t.msg}
          </${motion.div}>
        `)}
      </${AnimatePresence}>
    </${React.Fragment}>
  `;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
