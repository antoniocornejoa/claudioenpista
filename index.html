<style>
  *{cursor:none}
  html,body{background:#070707;color:#fff;font-family:'Space Grotesk',system-ui,sans-serif;overflow-x:hidden}
  .display{font-family:'Bebas Neue',Impact,sans-serif;letter-spacing:.02em}
  .glow{text-shadow:0 0 30px rgba(255,106,0,.6),0 0 60px rgba(255,106,0,.3)}
  .grain{background-image:radial-gradient(rgba(255,255,255,.03) 1px,transparent 1px);background-size:3px 3px}
  .checker{background-image:repeating-linear-gradient(45deg,#fff 0 18px,transparent 18px 36px);opacity:.05}
  .neon-border{box-shadow:0 0 0 1px rgba(255,106,0,.4),0 0 25px rgba(255,106,0,.25),inset 0 0 25px rgba(255,106,0,.05)}
  .hover-glow{transition:all .4s cubic-bezier(.2,.8,.2,1)}
  .hover-glow:hover{box-shadow:0 0 40px rgba(255,106,0,.55),0 0 80px rgba(255,106,0,.3);transform:translateY(-4px)}
  ::selection{background:#ff6a00;color:#000}
  /* loader */
  #loader{position:fixed;inset:0;background:#070707;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column}
  #loader.done{opacity:0;pointer-events:none;transition:opacity .8s ease}
  .loader-bar{width:240px;height:2px;background:#222;overflow:hidden;margin-top:24px}
  .loader-bar i{display:block;height:100%;background:#ff6a00;width:0;transition:width .15s linear;box-shadow:0 0 14px #ff6a00}
  .blink{animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:.2}}
  /* cursor */
  #cur{position:fixed;top:0;left:0;width:14px;height:14px;border-radius:50%;background:#ff6a00;mix-blend-mode:difference;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s}
  #curRing{position:fixed;top:0;left:0;width:42px;height:42px;border:1.5px solid rgba(255,106,0,.6);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform .15s ease-out,width .25s,height .25s,border-color .25s}
  /* progress */
  #prog{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#ff6a00,#ffb35a);z-index:9990;width:0;box-shadow:0 0 12px #ff6a00}
  /* horizontal scroll */
  .h-track{display:flex;gap:24px;will-change:transform}
  /* tilt card base */
  .tilt{transform-style:preserve-3d;transition:transform .15s ease-out;will-change:transform}
  .tilt > *{transform:translateZ(40px)}
  /* hide scrollbar nicely */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:#0a0a0a}
  ::-webkit-scrollbar-thumb{background:#ff6a00;border-radius:8px}
@media (max-width:767px){*{cursor:auto !important}#cur,#curRing{display:none !important}#bg3d{display:none !important}body{font-size:15px}.hover-glow:hover{transform:none;box-shadow:0 0 20px rgba(255,106,0,.35)}.tilt > *{transform:none !important}.h-track{flex-direction:column !important;transform:none !important;gap:16px !important}.h-track > *{min-width:100% !important;width:100% !important}h1,.text-7xl,.text-8xl{font-size:44px !important;line-height:1.05}h2,.text-5xl,.text-6xl{font-size:32px !important;line-height:1.1}h3,.text-4xl{font-size:24px !important}section{padding:48px 18px !important}.grid-cols-2,.grid-cols-3,.grid-cols-4{grid-template-columns:1fr !important}nav{padding:12px 16px !important}}
[data-lenis-prevent]{overscroll-behavior:contain}
</style>

<script>
/* LOADER independiente — corre aunque los modulos ESM fallen */
(function(){
  var l=document.getElementById('loader'),b=document.getElementById('loaderBar'),pc=document.getElementById('loaderPct');
  var p=0;
  var iv=setInterval(function(){
    p+=Math.random()*9+5;
    if(p>=100){p=100;clearInterval(iv);setTimeout(function(){l.classList.add('done')},400);}
    b.style.width=p+'%';pc.textContent=Math.floor(p)+'%';
  },80);
  setTimeout(function(){l.classList.add('done')},6000);
})();
window.addEventListener('error',function(e){
  var x=document.getElementById('errBox');x.style.display='block';
  x.textContent='ERROR: '+(e.message||'')+'\n'+(e.filename||'')+':'+(e.lineno||'');
});
window.addEventListener('unhandledrejection',function(e){
  var x=document.getElementById('errBox');x.style.display='block';
  x.textContent='PROMISE REJECTION: '+(e.reason && (e.reason.stack||e.reason.message||e.reason));
});
</script>

<script type="module">
import React, { useEffect, useRef, useState, useMemo } from 'react';
import { createRoot } from 'react-dom/client';
import { motion, AnimatePresence, useScroll, useTransform, useSpring, useMotionValue, animate } from 'framer-motion';
import * as THREE from 'three';
import gsap from 'gsap';
import ScrollTrigger from 'gsap/ScrollTrigger';
import Lenis from 'lenis';
import htm from 'htm';
import { createClient } from '@supabase/supabase-js';

const html = htm.bind(React.createElement);
gsap.registerPlugin(ScrollTrigger);

/* ============== SUPABASE CLIENT ============== */
const SUPABASE_URL = 'https://osoblthqksoreeeazeuu.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_VhCXPk09-uVFBYW8rTmJiw_Kz2cbcxd';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, storageKey: 'cep:auth' }
});

const dbToSorteo = (s) => ({
  id: s.id,
  title: s.title,
  prize: s.prize || '',
  start: s.start_date || '',
  end:   s.end_date || '',
  active: !!s.active,
  status: s.status || 'activo',
  heroCards: Array.isArray(s.hero_cards) ? s.hero_cards : [],
  prizes:    Array.isArray(s.prizes)     ? s.prizes : [],
  bases:     Array.isArray(s.bases)      ? s.bases : []
});
const sorteoToDb = (s) => ({
  title: s.title,
  prize: s.prize || '',
  start_date: s.start || null,
  end_date: s.end || null,
  active: !!s.active,
  status: s.status || 'activo',
  hero_cards: s.heroCards || [],
  prizes: s.prizes || [],
  bases: s.bases || []
});
const dbToSticker = (s) => ({
  id: s.id,
  name: s.name,
  desc: s.description || '',
  price: s.price,
  emoji: s.emoji || '',
  sorteoId: s.sorteo_id,
  position: s.position || 0,
  active: !!s.active
});
const stickerToDb = (s) => ({
  name: s.name,
  description: s.desc || '',
  price: +s.price || 0,
  emoji: s.emoji || '',
  sorteo_id: s.sorteoId || null,
  position: s.position || 0,
  active: s.active !== false
});

async function dbFetchSorteos(){
  const { data, error } = await sb.from('sorteos').select('*').order('id', { ascending: true });
  if (error) throw error;
  return (data || []).map(dbToSorteo);
}
async function dbUpsertSorteo(s){
  const payload = sorteoToDb(s);
  if (s.id && Number.isInteger(s.id) && s.id < 1e10){
    const { data, error } = await sb.from('sorteos').update(payload).eq('id', s.id).select('*').single();
    if (error) throw error;
    return dbToSorteo(data);
  }
  const { data, error } = await sb.from('sorteos').insert(payload).select('*').single();
  if (error) throw error;
  return dbToSorteo(data);
}
async function dbDeleteSorteo(id){
  const { error } = await sb.from('sorteos').delete().eq('id', id);
  if (error) throw error;
}

async function dbFetchStickers(){
  const { data, error } = await sb.from('stickers').select('*').eq('active', true).order('position', { ascending: true });
  if (error) throw error;
  return (data || []).map(dbToSticker);
}
async function dbUpsertSticker(s){
  const payload = stickerToDb(s);
  if (s.id && Number.isInteger(s.id) && s.id < 1e10){
    const { data, error } = await sb.from('stickers').update(payload).eq('id', s.id).select('*').single();
    if (error) throw error;
    return dbToSticker(data);
  }
  const { data, error } = await sb.from('stickers').insert(payload).select('*').single();
  if (error) throw error;
  return dbToSticker(data);
}
async function dbDeleteSticker(id){
  // soft delete: marcar como inactivo, no romper FKs de compras pasadas
  const { error } = await sb.from('stickers').update({ active: false }).eq('id', id);
  if (error) throw error;
}

async function dbAdminSignIn(email, password){
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) throw error;
  const { data: adm, error: e2 } = await sb.from('admins').select('user_id').eq('user_id', data.user.id).maybeSingle();
  if (e2) throw e2;
  if (!adm){ await sb.auth.signOut(); throw new Error('Cuenta no autorizada como admin. Contactá al super admin.'); }
  return data.user;
}
async function dbAdminSignUp(email, password){
  const { data, error } = await sb.auth.signUp({ email, password });
  if (error) throw error;
  return data.user;
}
async function dbAdminSignOut(){ await sb.auth.signOut(); }
async function dbCurrentAdmin(){
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return null;
  const { data: adm } = await sb.from('admins').select('user_id').eq('user_id', user.id).maybeSingle();
  return adm ? user : null;
}

/* loader handled in non-module script above */

/* ============== CUSTOM CURSOR ============== */
const cur = document.getElementById('cur');
const curRing = document.getElementById('curRing');
let mx=0,my=0,rx=0,ry=0;
window.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px'; });
function loop(){ rx+=(mx-rx)*.18; ry+=(my-ry)*.18; curRing.style.left=rx+'px'; curRing.style.top=ry+'px'; requestAnimationFrame(loop); }
loop();
document.addEventListener('mouseover', e => {
  if (e.target.closest('button,a,.tilt,input')) { curRing.style.width='64px'; curRing.style.height='64px'; curRing.style.borderColor='#ff6a00'; cur.style.background='#fff'; }
  else { curRing.style.width='42px'; curRing.style.height='42px'; cur.style.background='#ff6a00'; }
});

/* ============== LENIS SMOOTH SCROLL ============== */
const lenis = new Lenis({ duration: 1.2, easing: t => Math.min(1, 1.001 - Math.pow(2, -10*t)), smoothWheel: true });
function raf(time){ lenis.raf(time); ScrollTrigger.update(); requestAnimationFrame(raf); }
requestAnimationFrame(raf);

/* ============== PROGRESS BAR ============== */
const prog = document.getElementById('prog');
lenis.on('scroll', ({ scroll, limit }) => { prog.style.width = (scroll/limit*100) + '%'; });

/* ============== THREE.JS BACKGROUND (rotating low-poly F1 car) ============== */
(function init3D(){
  const canvas = document.getElementById('bg3d');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, .1, 100);
  camera.position.set(0,1.4,7);

  const car = new THREE.Group();
  const orange = new THREE.MeshStandardMaterial({ color:0xff6a00, metalness:.85, roughness:.18, emissive:0x220800 });
  const orangeDark = new THREE.MeshStandardMaterial({ color:0xcc4f00, metalness:.8, roughness:.3 });
  const carbon = new THREE.MeshStandardMaterial({ color:0x0a0a0a, metalness:.6, roughness:.45 });
  const matteBlack = new THREE.MeshStandardMaterial({ color:0x050505, metalness:.4, roughness:.8 });
  const tireMat = new THREE.MeshStandardMaterial({ color:0x0a0a0a, roughness:.95, metalness:.05 });
  const rimMat = new THREE.MeshStandardMaterial({ color:0x999999, metalness:1, roughness:.3 });
  const glassMat = new THREE.MeshStandardMaterial({ color:0x1a2a3a, metalness:.9, roughness:.05, transparent:true, opacity:.7 });
  const redLight = new THREE.MeshStandardMaterial({ color:0xff2200, emissive:0xff2200, emissiveIntensity:1.5 });

  // ===== MONOCOQUE / CHASSIS principal (forma de gota) =====
  // sección central larga y baja
  const monoGeo = new THREE.BoxGeometry(2.6,.45,1.05);
  monoGeo.translate(0,0,0);
  const mono = new THREE.Mesh(monoGeo, orange);
  mono.position.set(-.2,.5,0);
  car.add(mono);

  // bordes laterales (sidepods)
  [.62,-.62].forEach(z => {
    const sp = new THREE.Mesh(new THREE.BoxGeometry(2.0,.38,.35), orange);
    sp.position.set(-.4,.45,z); car.add(sp);
    const spTop = new THREE.Mesh(new THREE.BoxGeometry(1.6,.08,.35), orangeDark);
    spTop.position.set(-.5,.66,z); car.add(spTop);
    // intake sidepod
    const intake = new THREE.Mesh(new THREE.BoxGeometry(.18,.28,.3), carbon);
    intake.position.set(.55,.5,z); car.add(intake);
  });

  // ===== NOSE (cono largo hacia adelante) =====
  const noseGeo = new THREE.CylinderGeometry(.05,.28,1.6,12);
  const nose = new THREE.Mesh(noseGeo, orange);
  nose.rotation.z = Math.PI/2;
  nose.position.set(2.1,.42,0);
  car.add(nose);

  // ===== FRONT WING (multi-elemento) =====
  const fwMain = new THREE.Mesh(new THREE.BoxGeometry(.08,.04,2.0), orange);
  fwMain.position.set(2.95,.28,0); car.add(fwMain);
  const fwUpper = new THREE.Mesh(new THREE.BoxGeometry(.25,.03,1.9), orangeDark);
  fwUpper.position.set(2.85,.37,0); car.add(fwUpper);
  const fwLower = new THREE.Mesh(new THREE.BoxGeometry(.3,.025,1.85), carbon);
  fwLower.position.set(2.75,.22,0); car.add(fwLower);
  // endplates frontales
  [.95,-.95].forEach(z => {
    const ep = new THREE.Mesh(new THREE.BoxGeometry(.45,.32,.04), carbon);
    ep.position.set(2.85,.32,z); car.add(ep);
  });

  // ===== COCKPIT con HALO =====
  const cockBase = new THREE.Mesh(new THREE.BoxGeometry(.85,.42,.6), carbon);
  cockBase.position.set(0,.78,0); car.add(cockBase);
  // cockpit interior (asiento)
  const seat = new THREE.Mesh(new THREE.BoxGeometry(.6,.25,.45), matteBlack);
  seat.position.set(.05,.85,0); car.add(seat);
  // halo (estructura de seguridad - aro sobre el cockpit)
  const haloFront = new THREE.Mesh(new THREE.TorusGeometry(.32,.035,8,16,Math.PI), carbon);
  haloFront.position.set(.4,1.0,0);
  haloFront.rotation.x = Math.PI/2;
  haloFront.rotation.z = Math.PI;
  car.add(haloFront);
  const haloBar1 = new THREE.Mesh(new THREE.CylinderGeometry(.03,.03,.7,8), carbon);
  haloBar1.rotation.z = Math.PI/2; haloBar1.position.set(.05,1.18,0); car.add(haloBar1);

  // ===== AIRBOX (toma de aire sobre el piloto) =====
  const airbox = new THREE.Mesh(new THREE.BoxGeometry(.55,.45,.45), orange);
  airbox.position.set(-.5,1.05,0); car.add(airbox);
  const airboxTop = new THREE.Mesh(new THREE.BoxGeometry(.4,.08,.35), carbon);
  airboxTop.position.set(-.5,1.32,0); car.add(airboxTop);
  // intake circular
  const intakeRing = new THREE.Mesh(new THREE.TorusGeometry(.14,.04,8,16), carbon);
  intakeRing.position.set(-.2,1.1,0);
  intakeRing.rotation.y = Math.PI/2;
  car.add(intakeRing);

  // ===== ENGINE COVER (carenado motor que se estrecha hacia atras) =====
  const engCover = new THREE.Mesh(new THREE.BoxGeometry(1.4,.55,.85), orange);
  engCover.position.set(-1.05,.78,0); car.add(engCover);
  const engNarrow = new THREE.Mesh(new THREE.BoxGeometry(.5,.35,.4), orangeDark);
  engNarrow.position.set(-1.7,.68,0); car.add(engNarrow);

  // ===== REAR WING =====
  // soportes
  [.3,-.3].forEach(z => {
    const sup = new THREE.Mesh(new THREE.BoxGeometry(.05,.7,.06), carbon);
    sup.position.set(-1.95,1.05,z); car.add(sup);
  });
  // ala principal
  const rwMain = new THREE.Mesh(new THREE.BoxGeometry(.18,.06,1.4), orange);
  rwMain.position.set(-1.95,1.32,0); car.add(rwMain);
  // segundo ala (DRS)
  const rwTop = new THREE.Mesh(new THREE.BoxGeometry(.12,.04,1.35), orangeDark);
  rwTop.position.set(-2.0,1.42,0); car.add(rwTop);
  // endplates traseros
  [.7,-.7].forEach(z => {
    const ep = new THREE.Mesh(new THREE.BoxGeometry(.35,.45,.04), carbon);
    ep.position.set(-2.0,1.25,z); car.add(ep);
  });
  // luz de lluvia trasera
  const rainLight = new THREE.Mesh(new THREE.BoxGeometry(.08,.08,.12), redLight);
  rainLight.position.set(-2.05,1.15,0); car.add(rainLight);

  // ===== ESCAPE =====
  const exhaust = new THREE.Mesh(new THREE.CylinderGeometry(.07,.09,.2,12), carbon);
  exhaust.rotation.z = Math.PI/2; exhaust.position.set(-2.1,.85,0); car.add(exhaust);

  // ===== DIFUSOR =====
  const diff = new THREE.Mesh(new THREE.BoxGeometry(.4,.18,1.0), carbon);
  diff.position.set(-1.95,.3,0); car.add(diff);

  // ===== RUEDAS (con neumático + llanta + brake duct) =====
  function makeWheel(){
    const g = new THREE.Group();
    // neumático
    const tire = new THREE.Mesh(new THREE.CylinderGeometry(.5,.5,.42,32), tireMat);
    tire.rotation.x = Math.PI/2;
    g.add(tire);
    // llanta
    const rim = new THREE.Mesh(new THREE.CylinderGeometry(.32,.32,.43,24), rimMat);
    rim.rotation.x = Math.PI/2;
    g.add(rim);
    // centro
    const hub = new THREE.Mesh(new THREE.CylinderGeometry(.08,.08,.46,12), orange);
    hub.rotation.x = Math.PI/2;
    g.add(hub);
    // radios
    for (let i=0;i<5;i++){
      const spoke = new THREE.Mesh(new THREE.BoxGeometry(.55,.04,.06), carbon);
      spoke.rotation.x = (i/5)*Math.PI*2;
      g.add(spoke);
    }
    return g;
  }
  const wheels = [];
  [[1.55,.5,.95],[1.55,.5,-.95],[-1.45,.5,.95],[-1.45,.5,-.95]].forEach(([x,y,z])=>{
    const w = makeWheel();
    w.position.set(x,y,z);
    car.add(w);
    wheels.push(w);
  });

  // ===== SUSPENSIÓN (brazos visibles) =====
  [[1.55,.95],[1.55,-.95],[-1.45,.95],[-1.45,-.95]].forEach(([x,z]) => {
    const arm = new THREE.Mesh(new THREE.CylinderGeometry(.025,.025,.55,6), carbon);
    arm.rotation.x = Math.PI/2;
    arm.position.set(x,.5,z*.55);
    car.add(arm);
  });

  // ===== PISO REFLECTANTE para que no flote =====
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(40,40),
    new THREE.MeshStandardMaterial({ color:0x050505, metalness:.7, roughness:.4 })
  );
  floor.rotation.x = -Math.PI/2;
  floor.position.y = -.05;
  scene.add(floor);

  // sombra debajo del auto (disco oscuro)
  const shadow = new THREE.Mesh(
    new THREE.CircleGeometry(2.5,32),
    new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:.6 })
  );
  shadow.rotation.x = -Math.PI/2;
  shadow.position.y = -.04;
  scene.add(shadow);

  car.rotation.y = -.4;
  scene.add(car);

  // exponer wheels al loop para girarlas
  car.userData.wheels = wheels;

  // lights
  scene.add(new THREE.AmbientLight(0xffffff,.35));
  const key = new THREE.DirectionalLight(0xff8a3d,2.2); key.position.set(4,5,5); scene.add(key);
  const rim = new THREE.DirectionalLight(0x66aaff,1.2); rim.position.set(-5,3,-2); scene.add(rim);
  const pt = new THREE.PointLight(0xff6a00,3,12); pt.position.set(0,2,3); scene.add(pt);

  // particles
  const pgeo = new THREE.BufferGeometry();
  const pcount = 400;
  const pos = new Float32Array(pcount*3);
  for (let i=0;i<pcount;i++){ pos[i*3]= (Math.random()-.5)*30; pos[i*3+1]=(Math.random()-.5)*15; pos[i*3+2]=(Math.random()-.5)*20; }
  pgeo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const particles = new THREE.Points(pgeo, new THREE.PointsMaterial({ color:0xff6a00, size:.025, transparent:true, opacity:.6 }));
  scene.add(particles);

  function resize(){ renderer.setSize(innerWidth,innerHeight); camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); }
  resize(); addEventListener('resize',resize);

  let scrollY = 0;
  lenis.on('scroll', ({scroll}) => { scrollY = scroll; });

  function render(t){
    car.rotation.y = -.4 + Math.sin(t*.0004)*.4 + scrollY*.002;
    car.position.y = .05 + Math.sin(t*.001)*.08;
    if (car.userData.wheels) car.userData.wheels.forEach(w => w.rotation.x = t*.005);
    particles.rotation.y = t*.00005;
    camera.position.x = Math.sin(t*.0003)*.4;
    camera.lookAt(0,.6,0);
    renderer.render(scene,camera);
    requestAnimationFrame(render);
  }
  render(0);
})();

/* ============== HOOKS ============== */
function useTilt(){
  const ref = useRef(null);
  useEffect(()=>{
    const el = ref.current; if (!el) return;
    function move(e){
      const r = el.getBoundingClientRect();
      const x = (e.clientX - r.left)/r.width - .5;
      const y = (e.clientY - r.top)/r.height - .5;
      el.style.transform = `perspective(900px) rotateY(${x*14}deg) rotateX(${-y*14}deg) translateZ(0)`;
    }
    function leave(){ el.style.transform = 'perspective(900px) rotateY(0) rotateX(0)'; }
    el.addEventListener('mousemove',move); el.addEventListener('mouseleave',leave);
    return ()=>{ el.removeEventListener('mousemove',move); el.removeEventListener('mouseleave',leave); };
  },[]);
  return ref;
}

function Counter({ to, duration=2, suffix='' }){
  const [v,setV] = useState(0);
  const ref = useRef(null);
  useEffect(()=>{
    const obs = new IntersectionObserver(([e])=>{
      if (e.isIntersecting){
        const c = animate(0,to,{ duration, ease:'easeOut', onUpdate:val=>setV(Math.floor(val)) });
        obs.disconnect();
        return ()=>c.stop();
      }
    },{threshold:.4});
    if (ref.current) obs.observe(ref.current);
    return ()=>obs.disconnect();
  },[to]);
  return html`<span ref=${ref}>${v.toLocaleString('es-CL')}${suffix}</span>`;
}

              <div class="p-6 space-y-3">

                    <div class="flex-1">

                      <button onClick=${()=>add(it.id)} class="w-8 h-8 bg-white/10 rounded-full hover:bg-brand hover:text-black">+</button>
                    </div>
                  </div>

              </div>
              <div class="p-6 border-t border-white/10 space-y-4">
                <div class="flex justify-between display text-2xl"><span>TOTAL</span><span class="text-brand">$${total.toLocaleString('es-CL')}</span></div>

                <button onClick=${pay} class="w-full py-4 bg-brand text-black display tracking-widest text-lg rounded-full hover-glow">💳 PAGAR CON STRIPE</button>

            `}

        </${motion.div}>
      `}
    </${AnimatePresence}>
  `;
}

/* ============== ADMIN PANEL ============== */
function Admin({ open, close, sorteos, stickersList,
                 patchSorteoLocal, saveSorteoAt, addSorteo, deleteSorteoById,
                 patchStickerLocal, saveStickerAt, addSticker, deleteStickerById,
                 refreshSorteos, refreshStickers, dbReady, dbError }){
  const [user,setUser] = useState(null);
  const [authMode,setAuthMode] = useState('signin'); // 'signin' | 'signup'
  const [email,setEmail] = useState('');
  const [pw,setPw] = useState('');
  const [authBusy,setAuthBusy] = useState(false);
  const [authMsg,setAuthMsg] = useState('');
  const [section,setSection] = useState('sorteos');
  const [editPanel,setEditPanel] = useState(null); // {idx, type:'prizes'|'hero'|'bases'}
  const isPanel = (i,t) => editPanel && editPanel.idx===i && editPanel.type===t;
  const togglePanel = (i,t) => setEditPanel(isPanel(i,t) ? null : {idx:i, type:t});

  // verificar sesion al abrir
  useEffect(()=>{
    if (!open) return;
    (async ()=>{
      const u = await dbCurrentAdmin();
      setUser(u);
    })();
  }, [open]);

  async function handleSignIn(){
    setAuthBusy(true); setAuthMsg('');
    try { const u = await dbAdminSignIn(email.trim(), pw); setUser(u); setPw(''); setAuthMsg(''); }
    catch(e){ setAuthMsg(e.message || 'Error de login'); }
    setAuthBusy(false);
  }
  async function handleSignUp(){
    setAuthBusy(true); setAuthMsg('');
    try {
      await dbAdminSignUp(email.trim(), pw);
      setAuthMsg('Cuenta creada. Pedile al super admin que te autorice (te tiene que agregar a la tabla admins). Después podés hacer login.');
      setAuthMode('signin'); setPw('');
    }
    catch(e){ setAuthMsg(e.message || 'Error al crear cuenta'); }
    setAuthBusy(false);
  }
  async function handleSignOut(){
    await dbAdminSignOut(); setUser(null);
  }

  // helpers para listas anidadas (heroCards, prizes, bases)
  function patchNested(idx, listKey, subIdx, patch){
    const list = [...(sorteos[idx][listKey] || [])];
    list[subIdx] = { ...list[subIdx], ...patch };
    patchSorteoLocal(idx, { [listKey]: list });
  }
  function appendToList(idx, listKey, item){
    const list = [...(sorteos[idx][listKey] || []), item];
    patchSorteoLocal(idx, { [listKey]: list });
  }
  function removeFromList(idx, listKey, subIdx){
    const list = [...(sorteos[idx][listKey] || [])];
    list.splice(subIdx, 1);
    patchSorteoLocal(idx, { [listKey]: list });
  }
  const [participants] = useState([
    { id:101, name:'Javier R.', email:'jr@mail.cl', numeros:5, fecha:'2026-04-01' },
    { id:102, name:'María P.',  email:'mp@mail.cl', numeros:8, fecha:'2026-04-02' },
    { id:103, name:'Cristóbal A.', email:'ca@mail.cl', numeros:3, fecha:'2026-04-03' },
    { id:104, name:'Dani S.', email:'ds@mail.cl', numeros:12, fecha:'2026-04-04' },
  ]);

  return html`
    <${AnimatePresence}>
      ${open && html`
        <${motion.div} initial=${{opacity:0}} animate=${{opacity:1}} exit=${{opacity:0}}

            <div class="flex items-center justify-between mb-10">

                <div class="text-xs tracking-[0.4em] text-brand">// PANEL DE CONTROL</div>

            </div>

const LS_KEY_SORTEOS = 'cep:sorteos:v1';
const LS_KEY_STICKERS = 'cep:stickers:v1';
function lsLoad(key, fallback){
  try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch(e){ console.warn('lsLoad failed', key, e); return fallback; }
}
function lsSave(key, value){
  try { localStorage.setItem(key, JSON.stringify(value)); }
  catch(e){ console.warn('lsSave failed', key, e); }
}

  status:'activo',
  heroCards:[
    {title:'INTERLAGOS', desc:'4.309 KM \u00b7 71 VUELTAS', color1:'#22c55e', color2:'#eab308'},
    {title:'SAO PAULO',  desc:'BRASIL \u00b7 NOVIEMBRE 2026', color1:'#eab308', color2:'#ff6a00'},
    {title:'GRAND PRIX', desc:'EXPERIENCIA VIP', color1:'#ff6a00', color2:'#dc2626'}
  ],
  prizes:[
    {t:'VUELOS',d:'Pasajes ida y vuelta Santiago \u2014 S\u00e3o Paulo para 2 personas'},
    {t:'HOTEL',d:'4 noches en hotel 4\u2605 con desayuno incluido'},
    {t:'TICKETS',d:'Entradas oficiales GP Brasil 2026 los 3 d\u00edas'},
    {t:'TRASLADOS',d:'Aeropuerto, hotel y circuito coordinados'},
    {t:'PADDOCK',d:'Acceso preferencial zona pit lane'},
    {t:'SEGURO',d:'Seguro de viaje internacional incluido'}
  ],
  bases:[
    {label:'Organizador', value:'Claudio en Pista (@claudioenpista).'},
    {label:'Vigencia', value:'del 1 de mayo al 25 de octubre de 2026.'},
    {label:'Participantes', value:'mayores de 18 a\u00f1os residentes en Chile con c\u00e9dula vigente.'},
    {label:'Mec\u00e1nica', value:'por cada compra de stickers oficiales en el sitio, el participante recibe n\u00fameros correlativos (1 por cada $1.000 CLP gastados).'},
    {label:'Sorteo', value:'realizado ante Notario P\u00fablico de Santiago el 1 de noviembre de 2026 y transmitido en vivo por Instagram.'},
    {label:'Premio', value:'viaje para dos personas al GP de Brasil 2026 (vuelos, hotel 4 noches, entradas 3 d\u00edas, traslados y seguro). No canjeable por dinero.'}
  ]
}];
const DEFAULT_STICKERS = STICKERS.map(s=>({...s,sorteoId:1}));
function migrateSorteos(arr){
  if (!Array.isArray(arr) || arr.length === 0) return DEFAULT_SORTEOS;
  const fb = DEFAULT_SORTEOS[0];
  return arr.map(s => ({
    id: s.id || Date.now(),
    title: s.title || 'Sorteo',
    prize: s.prize || '',
    start: s.start || '',
    end: s.end || '',
    active: !!s.active,
    status: s.status || 'activo',
    heroCards: Array.isArray(s.heroCards) && s.heroCards.length ? s.heroCards : fb.heroCards,
    prizes:    Array.isArray(s.prizes)    && s.prizes.length    ? s.prizes    : fb.prizes,
    bases:     Array.isArray(s.bases)     && s.bases.length     ? s.bases     : fb.bases,
  }));
}

/* ============== APP ============== */
function App(){
  const [tab,setTab] = useState('home');
  const [cart,setCart] = useState({});
  const [cartOpen,setCartOpen] = useState(false);
  const [adminOpen,setAdminOpen] = useState(false);
  // state arranca con cache de localStorage para render inmediato; despues hidrata del DB
  const [sorteos,setSorteos] = useState(() => migrateSorteos(lsLoad(LS_KEY_SORTEOS, DEFAULT_SORTEOS)));
  const [stickersList,setStickersList] = useState(() => {
    const loaded = lsLoad(LS_KEY_STICKERS, DEFAULT_STICKERS);
    return Array.isArray(loaded) && loaded.length ? loaded : DEFAULT_STICKERS;
  });
  const [dbReady,setDbReady] = useState(false);
  const [dbError,setDbError] = useState(null);

  // hidratar del DB al montar
  useEffect(()=>{
    let cancelled = false;
    (async ()=>{
      try {
        const [s, st] = await Promise.all([dbFetchSorteos(), dbFetchStickers()]);
        if (cancelled) return;
        if (s.length) setSorteos(s);
        if (st.length) setStickersList(st);
        setDbReady(true);
      } catch(e){
        console.warn('DB hydration failed, using localStorage cache', e);
        if (!cancelled) setDbError(e.message || String(e));
      }
    })();
    return ()=>{ cancelled = true; };
  }, []);

  // cache persistente en localStorage como fallback offline
  useEffect(()=>{ lsSave(LS_KEY_SORTEOS, sorteos); }, [sorteos]);
  useEffect(()=>{ lsSave(LS_KEY_STICKERS, stickersList); }, [stickersList]);

  // ====== mutaciones admin (DB + state) ======
  async function refreshSorteos(){
    try { setSorteos(await dbFetchSorteos()); } catch(e){ alert('Error al recargar sorteos: '+e.message); }
  }
  async function refreshStickers(){
    try { setStickersList(await dbFetchStickers()); } catch(e){ alert('Error al recargar stickers: '+e.message); }
  }
  // edicion local en vivo (sin red), por keystroke
  function patchSorteoLocal(idx, patch){
    setSorteos(prev => prev.map((s,i)=> i===idx ? {...s, ...patch} : s));
  }
  function patchStickerLocal(idx, patch){
    setStickersList(prev => prev.map((s,i)=> i===idx ? {...s, ...patch} : s));
  }
  async function saveSorteoAt(idx){
    const s = sorteos[idx]; if (!s) return;
    try {
      const saved = await dbUpsertSorteo(s);
      setSorteos(prev => prev.map((x,i)=> i===idx ? saved : x));
    } catch(e){ alert('Error al guardar sorteo: '+e.message); }
  }
  async function addSorteo(){
    const tpl = {
      title:'Nuevo sorteo', prize:'', start:'', end:'', active:false, status:'activo',
      heroCards:[{title:'CARD 1',desc:'Descripción',color1:'#ff6a00',color2:'#dc2626'}],
      prizes:[{t:'PREMIO 1',d:'Descripción'}],
      bases:[{label:'Organizador',value:'Claudio en Pista'}]
    };
    try { const saved = await dbUpsertSorteo(tpl); setSorteos(prev => [...prev, saved]); }
    catch(e){ alert('Error al crear sorteo: '+e.message); }
  }
  async function deleteSorteoById(id){
    try { await dbDeleteSorteo(id); setSorteos(prev => prev.filter(s => s.id !== id)); }
    catch(e){ alert('Error al borrar sorteo: '+e.message); }
  }
  async function saveStickerAt(idx){
    const s = stickersList[idx]; if (!s) return;
    try {
      const saved = await dbUpsertSticker(s);
      setStickersList(prev => prev.map((x,i)=> i===idx ? saved : x));
    } catch(e){ alert('Error al guardar sticker: '+e.message); }
  }
  async function addSticker(){
    const tpl = { name:'NUEVO STICKER', price:1000, emoji:'🆕', desc:'', sorteoId: (sorteos.find(x=>x.active)?.id) || null, position:(stickersList.length+1)*10 };
    try { const saved = await dbUpsertSticker(tpl); setStickersList(prev => [...prev, saved]); }
    catch(e){ alert('Error al crear sticker: '+e.message); }
  }
  async function deleteStickerById(id){
    try { await dbDeleteSticker(id); setStickersList(prev => prev.filter(s => s.id !== id)); }
    catch(e){ alert('Error al borrar sticker: '+e.message); }
  }
  const cartCount = Object.values(cart).reduce((a,b)=>a+b,0);
  const add = id => setCart(c=>({...c,[id]:(c[id]||0)+1}));
  const sub = id => setCart(c=>{ const n={...c}; n[id]=(n[id]||0)-1; if(n[id]<=0)delete n[id]; return n; });
  const goto = t => { ScrollTrigger.getAll().forEach(st=>st.kill()); lenis.stop(); setTab(t); setTimeout(()=>{window.scrollTo({top:0,behavior:'instant'});lenis.start();},50); };

  const activeSorteo = sorteos.find(s=>s.active && s.status!=='bloqueado');
  const heroCards = activeSorteo && activeSorteo.heroCards;

  return html`
    <${React.Fragment}>
      <${Nav} tab=${tab} setTab=${goto} cartCount=${cartCount} openCart=${()=>setCartOpen(true)} openAdmin=${()=>setAdminOpen(true)}/>
      ${tab==='home' && html`
        <${React.Fragment}>
          <${Hero} goto=${goto}/>
          <${Marquee}/>
          <${HorizontalGallery} goto=${goto} heroCards=${heroCards}/>
          <${Sorteo} goto=${goto} sorteos=${sorteos}/>
        </${React.Fragment}>
      `}
      ${tab==='sorteo' && html`<div class="pt-24"><div class="px-6 pt-6"><button onClick=${()=>goto('home')} class="flex items-center gap-2 text-sm tracking-widest text-neutral-400 hover:text-brand transition-colors uppercase cursor-pointer">\u2190 VOLVER A INICIO</button></div><${Sorteo} goto=${goto} sorteos=${sorteos}/></div>`}
      ${tab==='stickers' && html`<div class="pt-24"><div class="px-6 pt-6"><button onClick=${()=>goto('home')} class="flex items-center gap-2 text-sm tracking-widest text-neutral-400 hover:text-brand transition-colors uppercase cursor-pointer">\u2190 VOLVER A INICIO</button></div><${Stickers} cart=${cart} add=${add} sub=${sub} stickersList=${stickersList} activeSorteo=${activeSorteo}/></div>`}

      <footer class="border-t border-white/10 mt-20 py-10 text-center">
        <div class="display text-2xl text-brand">CLAUDIO EN PISTA</div>
        <div class="text-xs tracking-[0.3em] text-neutral-600 mt-2">© 2026 · DEMO PREMIUM · STRIPE SANDBOX</div>
      </footer>

      <${CartDrawer} open=${cartOpen} close=${()=>setCartOpen(false)} cart=${cart} add=${add} sub=${sub} stickersList=${stickersList}/>
      <${Admin} open=${adminOpen} close=${()=>setAdminOpen(false)}
        sorteos=${sorteos} stickersList=${stickersList}
        patchSorteoLocal=${patchSorteoLocal} saveSorteoAt=${saveSorteoAt} addSorteo=${addSorteo} deleteSorteoById=${deleteSorteoById}
        patchStickerLocal=${patchStickerLocal} saveStickerAt=${saveStickerAt} addSticker=${addSticker} deleteStickerById=${deleteStickerById}
        refreshSorteos=${refreshSorteos} refreshStickers=${refreshStickers}
        dbReady=${dbReady} dbError=${dbError}/>
    </${React.Fragment}>
  `;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
