/* ===== Helpers fecha Chile ↔ ISO ===== */
// ISO timestamptz → string para <input type="datetime-local"> en hora Chile
function isoToChileLocal(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const fmt = new Intl.DateTimeFormat('en-CA', {
    timeZone: 'America/Santiago',
    year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit', hour12:false
  });
  const parts = Object.fromEntries(fmt.formatToParts(d).filter(p=>p.type!=='literal').map(p=>[p.type,p.value]));
  const hour = parts.hour === '24' ? '00' : parts.hour;
  return `${parts.year}-${parts.month}-${parts.day}T${hour}:${parts.minute}`;
}
// String "YYYY-MM-DDTHH:MM" interpretado como hora Chile → ISO timestamptz
function chileLocalToISO(local) {
  if (!local) return null;
  const asUTC = new Date(local + ':00Z'); // primero parseamos como si fuera UTC
  if (isNaN(asUTC.getTime())) return null;
  const offsetStr = new Intl.DateTimeFormat('en', {
    timeZone:'America/Santiago', timeZoneName:'shortOffset'
  }).formatToParts(asUTC).find(p=>p.type==='timeZoneName').value;
  const m = offsetStr.match(/GMT([+-])(\d{1,2})(?::(\d{2}))?/);
  let offsetMins = -240; // fallback CLT
  if (m) {
    const sign = m[1]==='-' ? -1 : 1;
    offsetMins = sign * (parseInt(m[2])*60 + parseInt(m[3]||'0'));
  }
  return new Date(asUTC.getTime() - offsetMins * 60000).toISOString();
}

// Upload de imagen de sticker a Supabase Storage. Devuelve la public URL.
async function dbUploadStickerImage(file, stickerId){
  if (!file) throw new Error('no file');
  const ext = (file.name.split('.').pop() || 'png').toLowerCase().replace(/[^a-z0-9]/g,'');
  const path = `${stickerId || 'tmp'}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
  const { error: upErr } = await sb.storage.from('stickers').upload(path, file, {
    cacheControl: '3600', upsert: false, contentType: file.type || 'image/png'
  });
  if (upErr) throw upErr;
  const { data } = sb.storage.from('stickers').getPublicUrl(path);
  return data.publicUrl;
}
async function dbDeleteStickerImage(url){
  // url tipo https://xxx.supabase.co/storage/v1/object/public/stickers/{path}
  if (!url) return;
  const m = url.match(/\/storage\/v1\/object\/public\/stickers\/(.+)$/);
  if (!m) return;
  await sb.storage.from('stickers').remove([m[1]]);
}

// Compresion client-side: redimensiona a max 1200px y exporta WebP quality 0.9
// Reduce drasticamente el tamaño antes de subir. SVG y GIF (animado) se dejan tal cual.
async function compressImage(file, maxDim = 1200, quality = 0.9){
  if (!file) return file;
  // No tocar SVG (vector) ni GIF (puede ser animado)
  if (file.type === 'image/svg+xml' || file.type === 'image/gif') return file;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        const ratio = Math.min(1, maxDim / Math.max(width, height));
        width = Math.round(width * ratio);
        height = Math.round(height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        // fondo transparente preservado solo en PNG/WEBP
        ctx.drawImage(img, 0, 0, width, height);
        // si era PNG con transparencia, mantener PNG; sino WebP
        const outType = (file.type === 'image/png') ? 'image/webp' : 'image/webp';
        canvas.toBlob((blob) => {
          if (!blob) return reject(new Error('La compresión falló'));
          // Si por algun caso el comprimido pesa mas que el original, devolver el original
          if (blob.size >= file.size) return resolve(file);
          const ext = outType === 'image/webp' ? 'webp' : 'jpg';
          const newName = (file.name||'image').replace(/\.[^.]+$/, '') + '.' + ext;
          resolve(new File([blob], newName, { type: outType }));
        }, outType, quality);
      };
      img.onerror = () => reject(new Error('No se pudo decodificar la imagen'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
    reader.readAsDataURL(file);
  });
}

// Re-cálculo del HMAC en cliente para verificación independiente
async function verifyVRF(seedHex, hashPreCommit, count){
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey('raw', enc.encode(seedHex), { name:'HMAC', hash:'SHA-256' }, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', key, enc.encode(hashPreCommit));
  const hex = Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2,'0')).join('');
  // Tomar primeros 16 chars hex (64 bits) y mod count
  const first16 = hex.slice(0,16);
  const big = BigInt('0x' + first16);
  const idx = Number(big % BigInt(count));
  return { hmac_hex: hex, winner_index: idx };
}

// ===== Calculo de precio por packs (programacion dinamica) =====
// Mismo algoritmo que la funcion SQL calc_pack_price (DP, optimal pack combination).
function calcPackPrice(qty, config){
  if (!qty || qty <= 0) return 0;
  const cfg = config && config.packs ? config : DEFAULT_PACKS_PRICING;
  const packs = cfg.packs || [];
  const extra = cfg.extra_price || 3000;
  const dp = new Array(qty + 1).fill(Infinity);
  dp[0] = 0;
  for (let n = 1; n <= qty; n++){
    if (dp[n-1] !== Infinity) dp[n] = Math.min(dp[n], dp[n-1] + extra);
    for (const p of packs){
      if (p.n <= n && dp[n-p.n] !== Infinity){
        dp[n] = Math.min(dp[n], dp[n-p.n] + p.price);
      }
    }
  }
  return dp[qty] === Infinity ? qty * (cfg.extra_price||3000) : dp[qty];
}

      glbCar.position.y += .2;
      car.add(glbCar);
      // Buscar ruedas si tienen nombre estándar
      glbCar.traverse(obj => {
        const n = (obj.name || '').toLowerCase();
        if (n.includes('wheel') || n.includes('rueda') || n.includes('tire')) wheels.push(obj);
      });
    }, undefined, (err) => {
      console.warn('GLB load failed, fallback al modelo procedural', err);
      buildProceduralCar();
    });
  } else {
    buildProceduralCar();
  }

  // ===== PISO REFLECTANTE para que no flote =====
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(40,40),
    new THREE.MeshStandardMaterial({ color:0x050505, metalness:.7, roughness:.4 })
  );
  floor.rotation.x = -Math.PI/2;
  floor.position.y = -.05;
  scene.add(floor);

  // sombra debajo del auto (disco oscuro)
  const shadow = new THREE.Mesh(
    new THREE.CircleGeometry(2.5,32),
    new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:.6 })
  );
  shadow.rotation.x = -Math.PI/2;
  shadow.position.y = -.04;
  scene.add(shadow);

  car.rotation.y = -.4;
  scene.add(car);

  // exponer wheels al loop para girarlas
  car.userData.wheels = wheels;

  // ============== Iluminación cinematográfica ==============
  // Ambient suave
  scene.add(new THREE.AmbientLight(0xffffff, .25));
  // Hemisphere para gradient sky/floor — da reflejos naturales en la chapa
  const hemi = new THREE.HemisphereLight(0xff8a3d, 0x1a0a00, .8); scene.add(hemi);
  // Key light cálida (luz principal naranja)
  const key = new THREE.DirectionalLight(0xff8a3d, 2.0); key.position.set(5, 6, 4); scene.add(key);
  // Rim light fría (contraluz azul para separar del fondo)
  const rim = new THREE.DirectionalLight(0x6699ff, 1.4); rim.position.set(-5, 3, -3); scene.add(rim);
  // Fill suave debajo
  const fill = new THREE.DirectionalLight(0xffffff, .4); fill.position.set(0, -3, 2); scene.add(fill);
  // Spot superior cenital tipo box pit
  const spot = new THREE.SpotLight(0xffffff, 1.5, 15, Math.PI/4, .5); spot.position.set(0, 8, 3); spot.target.position.set(0, 0, 0); scene.add(spot); scene.add(spot.target);
  // Acento naranja para reflejos saturados en la pintura
  const accent = new THREE.PointLight(0xff6a00, 4, 10); accent.position.set(2, 1, 4); scene.add(accent);
  const accent2 = new THREE.PointLight(0xff4400, 2, 8); accent2.position.set(-3, 1, -3); scene.add(accent2);

  // particles
  const pgeo = new THREE.BufferGeometry();
  const pcount = 400;
  const pos = new Float32Array(pcount*3);
  for (let i=0;i<pcount;i++){ pos[i*3]= (Math.random()-.5)*30; pos[i*3+1]=(Math.random()-.5)*15; pos[i*3+2]=(Math.random()-.5)*20; }
  pgeo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const particles = new THREE.Points(pgeo, new THREE.PointsMaterial({ color:0xff6a00, size:.025, transparent:true, opacity:.6 }));
  scene.add(particles);

  function resize(){ renderer.setSize(innerWidth,innerHeight); camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); }
  resize(); addEventListener('resize',resize);

  let scrollY = 0;
  lenis.on('scroll', ({scroll}) => { scrollY = scroll; });

  function render(t){
    car.rotation.y = -.4 + Math.sin(t*.0004)*.4 + scrollY*.002;
    car.position.y = .05 + Math.sin(t*.001)*.08;
    if (car.userData.wheels) car.userData.wheels.forEach(w => w.rotation.x = t*.005);
    particles.rotation.y = t*.00005;
    camera.position.x = Math.sin(t*.0003)*.4;
    camera.lookAt(0,.6,0);
    renderer.render(scene,camera);
    requestAnimationFrame(render);
  }
  render(0);
})();

/* ============== HOOKS ============== */
function useTilt(){
  const ref = useRef(null);
  useEffect(()=>{
    const el = ref.current; if (!el) return;
    function move(e){
      const r = el.getBoundingClientRect();
      const x = (e.clientX - r.left)/r.width - .5;
      const y = (e.clientY - r.top)/r.height - .5;
      el.style.transform = `perspective(900px) rotateY(${x*14}deg) rotateX(${-y*14}deg) translateZ(0)`;
    }
    function leave(){ el.style.transform = 'perspective(900px) rotateY(0) rotateX(0)'; }
    el.addEventListener('mousemove',move); el.addEventListener('mouseleave',leave);
    return ()=>{ el.removeEventListener('mousemove',move); el.removeEventListener('mouseleave',leave); };
  },[]);
  return ref;
}

function Counter({ to, duration=2, suffix='' }){
  const [v,setV] = useState(0);
  const ref = useRef(null);
  useEffect(()=>{
    const obs = new IntersectionObserver(([e])=>{
      if (e.isIntersecting){
        const c = animate(0,to,{ duration, ease:'easeOut', onUpdate:val=>setV(Math.floor(val)) });
        obs.disconnect();
        return ()=>c.stop();
      }
    },{threshold:.4});
    if (ref.current) obs.observe(ref.current);
    return ()=>obs.disconnect();
  },[to]);
  return html`<span ref=${ref}>${v.toLocaleString('es-CL')}${suffix}</span>`;
}

function Countdown({ targetDate, label='HASTA EL CIERRE' }){
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const i = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(i); }, []);
  const diff = new Date(targetDate).getTime() - now;
  if (diff <= 0) return html`<div class="inline-block px-4 py-2 bg-red-900/40 text-red-300 display tracking-widest text-sm rounded-full border border-red-500/40">SORTEO CERRADO</div>`;
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff / 3600000) % 24);
  const m = Math.floor((diff / 60000) % 60);
  const s = Math.floor((diff / 1000) % 60);
  return html`
    <div class="inline-block">
      <div class="text-[10px] tracking-[0.3em] text-neutral-500 mb-2">${label}</div>
      <div class="flex gap-2 sm:gap-3 items-center">
        ${[[d,'DÍAS'],[h,'HRS'],[m,'MIN'],[s,'SEG']].map((x,i) => html`
          <${React.Fragment} key=${i}>
            ${i>0 && html`<div class="text-brand opacity-40 text-xl">:</div>`}
            <div class="text-center bg-black/40 border border-white/10 rounded-xl px-3 py-2 min-w-[60px]">
              <div class="display text-2xl sm:text-3xl text-brand">${i===0?d:String(x[0]).padStart(2,'0')}</div>
              <div class="text-[8px] sm:text-[9px] tracking-widest text-neutral-500">${x[1]}</div>
            </div>
          </${React.Fragment}>
        `)}
      </div>
    </div>
  `;
}

// ===== RUT chileno: formato automatico y validacion del digito verificador =====
function rutCleanRaw(s){ return String(s||'').replace(/[^0-9kK]/g,'').toUpperCase(); }
function rutFormat(s){
  // Acepta input raw o ya formateado, devuelve "12.345.678-9"
  const c = rutCleanRaw(s);
  if (c.length === 0) return '';
  if (c.length === 1) return c; // a un solo char no agregamos guion todavia
  const body = c.slice(0,-1);
  const dv = c.slice(-1);
  // miles cada 3 desde la derecha
  const bodyDot = body.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return `${bodyDot}-${dv}`;
}
function rutCalculateDV(body){
  let sum = 0, mul = 2;
  for (let i = body.length-1; i >= 0; i--){ sum += parseInt(body[i],10)*mul; mul = mul===7?2:mul+1; }
  const r = 11 - (sum % 11);
  return r === 11 ? '0' : r === 10 ? 'K' : String(r);
}
function validateRUT(rut){
  const clean = rutCleanRaw(rut);
  if (clean.length < 8 || clean.length > 9) return false; // RUT chileno: 7-8 digits + DV
  const body = clean.slice(0,-1), dv = clean.slice(-1);
  if (!/^\d+$/.test(body)) return false;
  return dv === rutCalculateDV(body);
}

// Renderiza markdown muy simple (## headers, ** bold **, párrafos)
function renderSimpleMarkdown(md){
  if (!md) return '';
  const lines = md.split('\n');
  const out = [];
  let p = [];
  const flush = () => { if (p.length) { out.push(`<p>${p.join(' ')}</p>`); p = []; } };
  for (const ln of lines){
    if (!ln.trim()) { flush(); continue; }
    if (ln.startsWith('## ')) { flush(); out.push(`<h2>${ln.slice(3).trim()}</h2>`); continue; }
    if (ln.startsWith('### ')) { flush(); out.push(`<h3>${ln.slice(4).trim()}</h3>`); continue; }
    if (ln.startsWith('- ')) { flush(); out.push(`<li>${ln.slice(2)}</li>`); continue; }
    p.push(ln);
  }
  flush();
  return out.join('\n').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
}

  async function submit(){
    setErrMsg('');

    if (!/\S+@\S+\.\S+/.test(form.email)) return setErrMsg('Email inválido');
    if (!form.message.trim() || form.message.trim().length < 5) return setErrMsg('Escribe un mensaje (mín 5 caracteres)');

function CartDrawer({ open, close, cart, toggle, sub, stickersList, activeSorteo, gotoTab }){
  const [stage,setStage] = useState('idle');
  const [form,setForm] = useState({name:'',email:'',rut:'',phone:''});
  const [acceptTerms,setAcceptTerms] = useState(false);
  const [errMsg,setErrMsg] = useState('');
  const source = stickersList && stickersList.length ? stickersList : STICKERS;
  const items = Object.entries(cart)
    .filter(([,q]) => q)
    .map(([id])=>{ const s = source.find(x=>x.id===+id); return s || null; })
    .filter(Boolean);
  const packsCfg = (activeSorteo && activeSorteo.packsPricing) || DEFAULT_PACKS_PRICING;
  const qty = items.length;
  const total = calcPackPrice(qty, packsCfg);
  const numeros = qty; // 1 numero por sticker

  function goToForm(){ setErrMsg(''); setStage('form'); }
  async function submitCheckout(){
    setErrMsg('');
    if (!form.name.trim()) return setErrMsg('Ingresa tu nombre');
    if (!/\S+@\S+\.\S+/.test(form.email)) return setErrMsg('Email inválido');
    if (!form.rut.trim()) return setErrMsg('El RUT es obligatorio');
    if (!validateRUT(form.rut)) return setErrMsg('RUT inválido — revisa el dígito verificador');
    if (!acceptTerms) return setErrMsg('Tienes que aceptar los Términos y Condiciones');
    setStage('redirecting');
    try {
      let vendedorSlug = null;
      try { vendedorSlug = sessionStorage.getItem('cep:vendedor_slug') || null; } catch(_) {}
      const payload = {
        sticker_ids: items.map(it => it.id),
        customer: { name: form.name.trim(), email: form.email.trim().toLowerCase(), rut: form.rut.trim(), phone: form.phone.trim()||null },
        return_url: window.location.origin,
        vendedor_slug: vendedorSlug
      };
      const res = await fetch(`${SUPABASE_URL}/functions/v1/create-checkout`, {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok || !data.url) throw new Error(data.error || 'Error al crear sesión de pago');
      Object.keys(cart).forEach(k=>sub(+k));
      window.location.href = data.url;
    } catch(e){
      setErrMsg(e.message || 'Error inesperado');
      setStage('form');
    }

              <div class="p-10 text-center">
                <div class="text-7xl animate-pulse">💳</div>
                <div class="display text-2xl mt-6">REDIRIGIENDO A STRIPE...</div>
                <div class="text-sm text-neutral-500 mt-2">$${total.toLocaleString('es-CL')}</div>
                <div class="text-[10px] text-neutral-600 mt-4 tracking-widest">NO CIERRES ESTA VENTANA</div>
              </div>
            ` : stage==='form' ? html`

                <div class="text-xs tracking-[0.4em] text-brand">// DATOS DEL COMPRADOR</div>

                  placeholder="Nombre completo *"

                <input type="email" value=${form.email} onChange=${e=>setForm(f=>({...f,email:e.target.value}))}
                  placeholder="Email *"
                  class="w-full bg-black/40 border border-white/10 rounded-full px-5 py-3 outline-none focus:border-brand"/>
                <input value=${form.rut} onChange=${e=>setForm(f=>({...f,rut:rutFormat(e.target.value)}))}

                  placeholder="Teléfono (opcional)"

function FAQAdmin({ showToast }){
  const [faqs, setFaqs] = useState([]);
  const [busy, setBusy] = useState(false);
  async function refresh(){
    try { const { data, error } = await sb.from('faqs').select('*').order('position'); if (error) throw error; setFaqs(data || []); }
    catch(e){ showToast('Error: '+e.message, 'err'); }
  }
  useEffect(()=>{ refresh(); }, []);
  function patchLocal(idx, patch){ setFaqs(prev => prev.map((f,i)=> i===idx ? {...f, ...patch} : f)); }
  async function save(idx){
    const f = faqs[idx]; if (!f) return;
    setBusy(true);
    try {
      const payload = { question: f.question, answer: f.answer, position: f.position||0, active: f.active!==false };
      let res;
      if (f.id) {
        res = await sb.from('faqs').update(payload).eq('id', f.id).select().single();
      } else {
        res = await sb.from('faqs').insert(payload).select().single();
      }
      if (res.error) throw res.error;
      patchLocal(idx, res.data);
      showToast('✓ FAQ guardada');
    } catch(e){ showToast('Error: '+e.message, 'err'); }
    setBusy(false);
  }
  async function remove(id){
    if (!confirm('¿Eliminar esta FAQ?')) return;
    try {
      const { error } = await sb.from('faqs').delete().eq('id', id);
      if (error) throw error;
      setFaqs(prev => prev.filter(x => x.id !== id));
      showToast('✓ Eliminada');
    } catch(e){ showToast('Error: '+e.message, 'err'); }
  }
  function add(){
    setFaqs(prev => [...prev, { question:'Nueva pregunta', answer:'', position: (prev.length+1)*10, active: true }]);
  }
  return html`
    <div>
      <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
        <div>
          <div class="display text-3xl">PREGUNTAS FRECUENTES</div>
          <div class="text-[10px] text-neutral-500 tracking-widest">${faqs.length} FAQs · ORDENADAS POR POSITION</div>
        </div>
        <div class="flex gap-2">
          <button onClick=${refresh} class="px-3 py-2 border border-white/20 rounded-full text-xs tracking-widest hover:border-brand">↻ RECARGAR</button>
          <button onClick=${add} class="px-5 py-2 bg-brand text-black display tracking-widest text-sm rounded-full hover-glow">+ AGREGAR</button>
        </div>
      </div>
      <div class="space-y-3">
        ${faqs.map((f,i)=>html`
          <div key=${f.id||i} class="border border-white/10 rounded-2xl bg-black/30 p-4 space-y-2">
            <div class="flex gap-2 items-center flex-wrap">
              <input type="number" value=${f.position||0} onChange=${e=>patchLocal(i,{position:+e.target.value})} class="w-20 bg-black/40 border border-white/10 rounded-lg px-3 py-2 outline-none focus:border-brand text-xs" title="Posición/orden"/>
              <input value=${f.question||''} onChange=${e=>patchLocal(i,{question:e.target.value})} placeholder="Pregunta" class="flex-1 min-w-[200px] bg-black/40 border border-white/10 rounded-lg px-3 py-2 outline-none focus:border-brand"/>
              <label class="flex items-center gap-2 text-xs"><input type="checkbox" checked=${f.active!==false} onChange=${e=>patchLocal(i,{active:e.target.checked})}/> ACTIVA</label>
              <button onClick=${()=>save(i)} disabled=${busy} class="px-4 py-2 rounded-lg text-xs border border-brand bg-brand/10 text-brand hover:bg-brand hover:text-black">💾 GUARDAR</button>
              ${f.id && html`<button onClick=${()=>remove(f.id)} class="text-red-500 hover:text-red-400">✕</button>`}
            </div>
            <textarea value=${f.answer||''} onChange=${e=>patchLocal(i,{answer:e.target.value})} placeholder="Respuesta" rows="3"
              class="w-full bg-black/60 border border-white/10 rounded-lg px-3 py-2 text-sm outline-none focus:border-brand resize-y"></textarea>
          </div>
        `)}
      </div>
    </div>
  `;
}

/* ============== Reloj Chile (referencia para configurar cierres) ============== */
function ChileClock(){
  const [now, setNow] = useState(new Date());
  useEffect(()=>{
    const t = setInterval(()=>setNow(new Date()), 1000);
    return ()=>clearInterval(t);
  },[]);
  const fmtDate = new Intl.DateTimeFormat('es-CL', {
    timeZone:'America/Santiago', weekday:'short', day:'2-digit', month:'short'
  });
  const fmtTime = new Intl.DateTimeFormat('es-CL', {
    timeZone:'America/Santiago', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
  });
  // Detectar si el horario es CLT (-04) o CLST (-03)
  const tzPart = new Intl.DateTimeFormat('en', { timeZone:'America/Santiago', timeZoneName:'shortOffset' }).formatToParts(now).find(p=>p.type==='timeZoneName');
  const offset = tzPart ? tzPart.value.replace('GMT','UTC') : '';
  return html`
    <div class="flex items-center gap-2 px-4 py-2 border border-brand/30 rounded-full bg-black/40 text-xs" title="Hora actual en Chile (referencia para configurar fechas de cierre)">
      <span class="text-brand text-base leading-none">🕐</span>
      <div class="flex flex-col leading-tight">
        <div class="text-neutral-400 text-[10px] uppercase tracking-widest">${fmtDate.format(now)} · ${offset}</div>
        <div class="text-white font-mono tabular-nums tracking-wider">${fmtTime.format(now)}</div>
      </div>
      <span class="text-[9px] text-neutral-500 tracking-widest border-l border-white/10 pl-2 ml-1">CHILE</span>
    </div>
  `;
}

/* ============== VENDEDORES / QR — Admin UI ============== */
function VendedoresAdmin({ showToast }){
  const [rows, setRows] = useState([]);
  const [busy, setBusy] = useState(false);
  const [commPct, setCommPct] = useState(10);
  const [savingComm, setSavingComm] = useState(false);
  const [showInactive, setShowInactive] = useState(false);
  const [qrModal, setQrModal] = useState(null); // {vendedor, dataUrl}

  async function refresh(){
    setBusy(true);
    try {
      const [revRes, settingRes] = await Promise.all([
        sb.from('v_vendedores_revenue').select('*'),
        sb.from('app_settings').select('value').eq('key', 'vendor_commission').maybeSingle(),
      ]);
      if (revRes.error) throw revRes.error;
      setRows(revRes.data || []);
      const pct = settingRes.data?.value?.pct ?? 10;
      setCommPct(Number(pct));
    } catch(e){ showToast('Error: '+e.message, 'err'); }
    setBusy(false);
  }
  useEffect(()=>{ refresh(); }, []);

  async function saveCommission(){
    setSavingComm(true);
    try {
      const newPct = Math.max(0, Math.min(100, Number(commPct) || 0));
      const { error } = await sb.from('app_settings').upsert({ key:'vendor_commission', value:{ pct: newPct, base:'neto' }, updated_at: new Date().toISOString() }, { onConflict:'key' });
      if (error) throw error;
      showToast(`✓ Comisión global actualizada a ${newPct}%`);
      await refresh();
    } catch(e){ showToast('Error: '+e.message, 'err'); }
    setSavingComm(false);
  }

  async function addVendor(){
    const name = prompt('Nombre del punto de venta (ej: "Bencinera Copec El Bosque"):');
    if (!name || !name.trim()) return;
    // Sugerir slug a partir del nombre
    const baseSlug = name.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40);
    const slug = prompt(`Código corto (slug) para la URL — solo letras minúsculas, números y guiones:`, baseSlug);
    if (!slug) return;
    const cleanSlug = slug.trim().toLowerCase();
    if (!/^[a-z0-9][a-z0-9-]{1,38}[a-z0-9]$/.test(cleanSlug)) {
      return showToast('Slug inválido. Usa solo a-z, 0-9 y guiones (mín 3 chars)', 'err');
    }
    try {
      const { data, error } = await sb.from('vendedores').insert({ name: name.trim(), slug: cleanSlug, active: true }).select().single();
      if (error) throw error;
      showToast(`✓ Vendedor "${data.name}" creado`);
      await refresh();
    } catch(e){
      if (e.code === '23505') showToast('Ya existe un vendedor con ese código', 'err');
      else showToast('Error: '+e.message, 'err');
    }
  }

  async function patchVendor(id, patch){
    try {
      const { error } = await sb.from('vendedores').update({ ...patch, updated_at: new Date().toISOString() }).eq('id', id);
      if (error) throw error;
      await refresh();
    } catch(e){ showToast('Error: '+e.message, 'err'); }
  }
  async function toggleActive(id, currentActive){
    if (!confirm(currentActive ? '¿Desactivar este vendedor? Su QR dejará de funcionar para nuevas compras (las anteriores siguen contando).' : '¿Reactivar este vendedor?')) return;
    await patchVendor(id, { active: !currentActive });
  }

  async function generateQR(vendor){
    const url = `${window.location.origin}/?ref=${vendor.slug}`;
    // Intento 1: librería local (jsdelivr o unpkg via fallback)
    if (window.QRCode && typeof window.QRCode.toDataURL === 'function') {
      try {
        const dataUrl = await window.QRCode.toDataURL(url, {
          width: 600, margin: 2,
          color: { dark: '#000000ff', light: '#ffffffff' },
          errorCorrectionLevel: 'M',
        });
        setQrModal({ vendor, dataUrl, url });
        return;
      } catch(e){ /* cae al fallback externo */ }
    }
    // Intento 2: API pública qrserver.com como respaldo (no requiere librería)
    try {
      const apiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=600x600&margin=10&data=${encodeURIComponent(url)}`;
      // Fetch a blob para tener un PNG real descargable
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error('qrserver.com falló');
      const blob = await res.blob();
      const dataUrl = await new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onloadend = () => resolve(r.result);
        r.onerror = reject;
        r.readAsDataURL(blob);
      });
      setQrModal({ vendor, dataUrl, url });
    } catch(e){
      showToast('No se pudo generar el QR. Revisa tu conexión a internet.', 'err');
    }
  }

  function downloadQR(){
    if (!qrModal) return;
    const a = document.createElement('a');
    a.href = qrModal.dataUrl;
    a.download = `qr-${qrModal.vendor.slug}.png`;
    a.click();
  }
  function copyURL(){
    if (!qrModal) return;
    navigator.clipboard.writeText(qrModal.url).then(()=>showToast('✓ URL copiada al portapapeles'));
  }

  const fmtCLP = (n)=> '$'+(n||0).toLocaleString('es-CL');
  const visibleRows = showInactive ? rows : rows.filter(r => r.active);
  const totals = visibleRows.reduce((acc,r)=>({
    brutas: acc.brutas + (r.ventas_brutas||0),
    netas: acc.netas + (r.ventas_netas||0),
    compras: acc.compras + (r.compras_paid||0),
    numeros: acc.numeros + (r.numeros_vendidos||0),
    comision: acc.comision + (r.comision_calculada||0),
  }), {brutas:0,netas:0,compras:0,numeros:0,comision:0});

  return html`
    <div>
      <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
        <div>
          <div class="display text-3xl">VENDEDORES / PUNTOS DE VENTA</div>
          <div class="text-[10px] text-neutral-500 tracking-widest">${rows.length} REGISTRADOS · ${rows.filter(r=>r.active).length} ACTIVOS · COMISIÓN ${commPct}% SOBRE NETO</div>
        </div>
        <div class="flex gap-2 flex-wrap">
          <label class="flex items-center gap-2 px-4 py-2 border border-white/20 rounded-full text-xs tracking-widest hover:border-brand cursor-pointer">
            <input type="checkbox" checked=${showInactive} onChange=${e=>setShowInactive(e.target.checked)}/> mostrar inactivos
          </label>
          <button onClick=${refresh} class="px-3 py-2 border border-white/20 rounded-full text-xs tracking-widest hover:border-brand">↻ RECARGAR</button>
          <button onClick=${addVendor} class="px-5 py-2 bg-brand text-black display tracking-widest text-sm rounded-full hover-glow">+ AGREGAR</button>
        </div>
      </div>

      <!-- Setting comisión global -->
      <div class="bg-yellow-900/10 border border-yellow-700/30 rounded-2xl p-4 mb-5 flex flex-wrap items-center gap-3">
        <div class="flex-1 min-w-[200px]">
          <div class="text-[10px] tracking-widest text-yellow-300 mb-1">// COMISIÓN GLOBAL (% sobre NETO sin IVA)</div>
          <div class="text-xs text-neutral-400">Aplica a todos los vendedores. Se calcula sobre <strong>monto neto</strong> (precio / 1,19) de las compras pagadas referidas por su QR.</div>
        </div>
        <div class="flex items-center gap-2">
          <input type="number" min="0" max="100" step="0.5" value=${commPct} onChange=${e=>setCommPct(e.target.value)}
            class="w-24 bg-black/40 border border-white/10 rounded-lg px-3 py-2 outline-none focus:border-brand text-right font-mono"/>
          <span class="text-yellow-300 font-bold">%</span>
          <button onClick=${saveCommission} disabled=${savingComm} class="px-4 py-2 bg-yellow-700/40 border border-yellow-700/60 hover:bg-yellow-600/50 text-yellow-200 rounded-full text-xs tracking-widest disabled:opacity-50">${savingComm?'...':'💾 GUARDAR'}</button>
        </div>
      </div>

      <!-- KPIs -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <div class="bg-white/5 border border-white/10 rounded-2xl p-4 min-w-0">
          <div class="text-[10px] tracking-widest text-neutral-400 mb-1">// VENTAS REFERIDAS (BRUTO)</div>
          <div class="display text-xl text-brand truncate">${fmtCLP(totals.brutas)}</div>
        </div>
        <div class="bg-white/5 border border-white/10 rounded-2xl p-4 min-w-0">
          <div class="text-[10px] tracking-widest text-neutral-400 mb-1">// NETO REFERIDO</div>
          <div class="display text-xl truncate">${fmtCLP(totals.netas)}</div>
        </div>
        <div class="bg-yellow-900/10 border border-yellow-700/30 rounded-2xl p-4 min-w-0">
          <div class="text-[10px] tracking-widest text-yellow-300 mb-1">// COMISIONES A PAGAR</div>
          <div class="display text-xl text-yellow-300 truncate">${fmtCLP(totals.comision)}</div>
        </div>
        <div class="bg-white/5 border border-white/10 rounded-2xl p-4 min-w-0">
          <div class="text-[10px] tracking-widest text-neutral-400 mb-1">// VENTAS</div>
          <div class="display text-xl">${totals.compras}</div>
          <div class="text-[10px] text-neutral-500 mt-1">${totals.numeros} números</div>
        </div>
      </div>

      <!-- Lista vendedores como cards -->
      ${busy ? html`<div class="text-center py-12 text-neutral-500">Cargando...</div>` : visibleRows.length === 0 ? html`
        <div class="text-center py-20 border-2 border-dashed border-white/10 rounded-2xl bg-white/5">
          <div class="text-5xl mb-3">📍</div>
          <div class="text-neutral-400">No hay vendedores ${showInactive?'':'activos '}registrados.</div>
          <button onClick=${addVendor} class="mt-4 px-6 py-3 bg-brand text-black display tracking-widest rounded-full hover-glow">+ AGREGAR EL PRIMERO</button>
        </div>
      ` : html`
        <div class="space-y-3">
          ${visibleRows.map(v => html`
            <div key=${v.vendedor_id} class=${"border rounded-xl p-4 transition "+(v.active?'border-white/10 bg-black/30 hover:border-white/20':'border-red-900/30 bg-red-900/5 opacity-60')}>
              <div class="flex items-start gap-4 flex-wrap">
                <div class="flex-1 min-w-[200px]">
                  <div class="flex items-center gap-2 flex-wrap">
                    <input value=${v.name} onBlur=${e=>e.target.value!==v.name && patchVendor(v.vendedor_id, { name: e.target.value })} class="font-semibold text-white bg-transparent outline-none focus:bg-black/40 rounded px-2 py-1 -ml-2"/>
                    ${!v.active && html`<span class="bg-red-900/40 text-red-400 px-2 py-0.5 rounded-full text-[9px] tracking-widest">INACTIVO</span>`}
                  </div>
                  <div class="text-[11px] text-neutral-500 mt-1 flex items-center gap-2 flex-wrap">
                    <span class="font-mono text-brand">/?ref=${v.slug}</span>
                    ${v.rut && html`<span>· RUT ${v.rut}</span>`}
                    ${v.contact_email && html`<span>· ${v.contact_email}</span>`}
                  </div>
                </div>
                <div class="flex flex-col items-end gap-1 shrink-0">
                  <div class="text-brand font-mono font-bold text-lg">${fmtCLP(v.ventas_brutas)}</div>
                  <div class="text-yellow-300 text-xs font-mono">comisión: ${fmtCLP(v.comision_calculada)}</div>
                  <div class="text-[10px] text-neutral-500">${v.compras_paid} ventas · ${v.numeros_vendidos} números</div>
                </div>
              </div>
              <div class="flex flex-wrap gap-2 mt-3 pt-3 border-t border-white/5">
                <button onClick=${()=>generateQR(v)} class="px-4 py-2 bg-brand/10 border border-brand/40 text-brand rounded-full text-xs tracking-widest hover:bg-brand hover:text-black transition">📱 VER QR</button>
                <button onClick=${async ()=>{
                  const newRut = prompt('RUT del vendedor (para boletas/comisión):', v.rut||'');
                  if (newRut !== null) await patchVendor(v.vendedor_id, { rut: newRut.trim()||null });
                }} class="px-3 py-2 border border-white/10 rounded-full text-xs hover:border-brand">RUT</button>
                <button onClick=${async ()=>{
                  const newEmail = prompt('Email del vendedor:', v.contact_email||'');
                  if (newEmail !== null) await patchVendor(v.vendedor_id, { contact_email: newEmail.trim()||null });
                }} class="px-3 py-2 border border-white/10 rounded-full text-xs hover:border-brand">EMAIL</button>
                <button onClick=${async ()=>{
                  const newPhone = prompt('Teléfono del vendedor:', v.contact_phone||'');
                  if (newPhone !== null) await patchVendor(v.vendedor_id, { contact_phone: newPhone.trim()||null });
                }} class="px-3 py-2 border border-white/10 rounded-full text-xs hover:border-brand">📞</button>
                <button onClick=${()=>toggleActive(v.vendedor_id, v.active)} class=${"ml-auto px-3 py-2 border rounded-full text-xs tracking-widest "+(v.active?'border-red-900/50 text-red-400 hover:bg-red-900/30':'border-green-900/50 text-green-400 hover:bg-green-900/30')}>
                  ${v.active?'DESACTIVAR':'REACTIVAR'}
                </button>
              </div>
            </div>
          `)}
        </div>
      `}

      <!-- Notas -->
      <div class="mt-6 p-5 bg-blue-900/10 border border-blue-700/30 rounded-2xl text-xs">
        <div class="display text-sm mb-2 text-blue-300">📋 CÓMO FUNCIONA</div>
        <ul class="list-disc list-inside space-y-1 text-neutral-300">

          <li>Cuando pagues a un vendedor, anótalo manualmente fuera del sistema (esta app aún no tracea pagos de comisión).</li>
        </ul>
      </div>

      <!-- Modal QR -->
      ${qrModal && html`
        <div onClick=${()=>setQrModal(null)} class="fixed inset-0 z-[70] bg-black/90 backdrop-blur flex items-center justify-center p-6">

              <h3 class="display text-2xl mb-4">${qrModal.vendor.name}</h3>
              <div class="bg-white p-4 rounded-2xl inline-block mb-4">

              <div class="flex gap-2 justify-center flex-wrap">

            </div>

        </div>
      `}

  `;
}

/* ============== INGRESOS / IVA — Admin UI ============== */
function IngresosAdmin({ showToast }){
  const [rows, setRows] = useState([]);
  const [busy, setBusy] = useState(false);
  async function refresh(){
    setBusy(true);
    try {
      const { data, error } = await sb.from('v_sorteos_revenue').select('*').order('sorteo_id', { ascending: false });
      if (error) throw error;
      setRows(data || []);
    } catch(e){ showToast('Error: '+e.message, 'err'); }
    setBusy(false);
  }
  useEffect(()=>{ refresh(); }, []);
  const fmtCLP = (n)=> '$'+(n||0).toLocaleString('es-CL');
  const totals = rows.reduce((acc,r)=>({
    total: acc.total + (r.total_recaudado||0),
    neto: acc.neto + (r.total_neto||0),
    iva: acc.iva + (r.iva_debito||0),
    compras: acc.compras + (r.compras_paid||0),
    numeros: acc.numeros + (r.numeros_vendidos||0),
    participantes: acc.participantes + (r.participantes_unicos||0),
  }), {total:0,neto:0,iva:0,compras:0,numeros:0,participantes:0});

  function exportCSV(){
    const headers = ['Sorteo ID','Sorteo','Estado','Total Recaudado CLP','Neto CLP','IVA Débito 19% CLP','Compras Pagadas','Compras Pendientes','Compras Fallidas','Números Vendidos','Participantes Únicos'];
    const lines = rows.map(r => [
      r.sorteo_id, `"${(r.sorteo_title||'').replace(/"/g,'""')}"`, r.lifecycle_status,
      r.total_recaudado, r.total_neto, r.iva_debito,
      r.compras_paid, r.compras_pending, r.compras_failed,
      r.numeros_vendidos, r.participantes_unicos
    ].join(','));
    const csv = [headers.join(','), ...lines, '', `"TOTAL",,,${totals.total},${totals.neto},${totals.iva},${totals.compras},,,${totals.numeros},${totals.participantes}`].join('\n');
    const blob = new Blob(["﻿"+csv], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `ingresos_sorteos_${new Date().toISOString().slice(0,10)}.csv`; a.click();
    URL.revokeObjectURL(url);
  }

  return html`
    <div>
      <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
        <div>
          <div class="display text-3xl">INGRESOS / IVA</div>
          <div class="text-[10px] text-neutral-500 tracking-widest">RESUMEN FINANCIERO POR SORTEO · IVA INCLUIDO EN PRECIO (19%)</div>
        </div>
        <div class="flex gap-2">
          <button onClick=${refresh} class="px-3 py-2 border border-white/20 rounded-full text-xs tracking-widest hover:border-brand">↻ RECARGAR</button>
          <button onClick=${exportCSV} class="px-5 py-2 bg-brand text-black display tracking-widest text-sm rounded-full hover-glow">↓ EXPORT CSV</button>
        </div>
      </div>

      <!-- KPI cards -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <div class="bg-gradient-to-br from-brand/20 via-brand/5 to-transparent border border-brand/40 rounded-2xl p-4 min-w-0">
          <div class="text-[10px] tracking-widest text-brand mb-1">// TOTAL RECAUDADO</div>
          <div class="display text-xl text-brand truncate" title=${fmtCLP(totals.total)}>${fmtCLP(totals.total)}</div>
          <div class="text-[10px] text-neutral-500 mt-1">CLP · IVA incluido</div>
        </div>
        <div class="bg-white/5 border border-white/10 rounded-2xl p-4 min-w-0">
          <div class="text-[10px] tracking-widest text-neutral-400 mb-1">// NETO (sin IVA)</div>
          <div class="display text-xl truncate" title=${fmtCLP(totals.neto)}>${fmtCLP(totals.neto)}</div>
          <div class="text-[10px] text-neutral-500 mt-1">total / 1,19</div>
        </div>
        <div class="bg-yellow-900/10 border border-yellow-700/30 rounded-2xl p-4 min-w-0">
          <div class="text-[10px] tracking-widest text-yellow-300 mb-1">// IVA DÉBITO</div>
          <div class="display text-xl text-yellow-300 truncate" title=${fmtCLP(totals.iva)}>${fmtCLP(totals.iva)}</div>
          <div class="text-[10px] text-neutral-500 mt-1">19% que va al SII</div>
        </div>
        <div class="bg-white/5 border border-white/10 rounded-2xl p-4 min-w-0">
          <div class="text-[10px] tracking-widest text-neutral-400 mb-1">// COMPRAS PAGADAS</div>
          <div class="display text-xl">${totals.compras.toLocaleString('es-CL')}</div>
          <div class="text-[10px] text-neutral-500 mt-1 truncate" title=${`${totals.numeros} números · ${totals.participantes} participantes`}>${totals.numeros.toLocaleString('es-CL')} núm. · ${totals.participantes.toLocaleString('es-CL')} pers.</div>
        </div>
      </div>

      <!-- Tabla por sorteo -->
      ${busy ? html`<div class="text-center py-12 text-neutral-500">Cargando...</div>` : rows.length === 0 ? html`

          <div class="text-4xl mb-3">📊</div>
          <div class="text-neutral-400">Aún no hay ingresos registrados.</div>
        </div>
      ` : html`
        <div class="overflow-x-auto border border-white/10 rounded-2xl">
          <table class="w-full text-sm whitespace-nowrap">

              <tr class="text-left text-neutral-500 text-[10px] tracking-widest border-b border-white/10 bg-black/30">
                <th class="py-3 px-3">SORTEO</th>
                <th class="px-3">ESTADO</th>
                <th class="px-3 text-right">TOTAL</th>
                <th class="px-3 text-right">NETO</th>
                <th class="px-3 text-right text-yellow-300">IVA 19%</th>
                <th class="px-3 text-center">COMPRAS</th>
                <th class="px-3 text-center">NÚMS.</th>
                <th class="px-3 text-center">PERS.</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => html`
                <tr key=${r.sorteo_id} class="border-b border-white/5 hover:bg-white/5">
                  <td class="py-3 px-3"><div class="font-semibold">${r.sorteo_title}</div><div class="text-[10px] text-neutral-500 font-mono">#${r.sorteo_id}</div></td>

/* ============== SORTEO VRF — Admin UI ============== */
async function findBlockAfter(targetTimestampMs){
  const targetSec = Math.floor(targetTimestampMs / 1000);
  // 1. Bloque más cercano al timestamp (al o antes)
  const r1 = await fetch(`https://mempool.space/api/v1/mining/blocks/timestamp/${targetSec}`);
  if (!r1.ok) throw new Error('mempool.space no responde — reintenta en un minuto');
  const data = await r1.json();
  if (data.timestamp >= targetSec) {
    return { height: data.height, hash: data.hash, timestamp: data.timestamp };
  }
  // 2. Necesitamos el siguiente
  const nextHeight = data.height + 1;
  const r2 = await fetch(`https://mempool.space/api/block-height/${nextHeight}`);
  if (!r2.ok) {
    throw new Error('Aún no hay un bloque BTC posterior al objetivo. Espera unos minutos (los bloques se minan cada ~10 min en promedio) y reintenta.');
  }
  const hash = (await r2.text()).trim();
  const r3 = await fetch(`https://mempool.space/api/block/${hash}`);
  if (!r3.ok) throw new Error('No se pudo obtener el detalle del bloque');
  const meta = await r3.json();
  return { height: meta.height, hash: meta.id, timestamp: meta.timestamp };
}

function SorteoVRFAdmin({ sorteos, refreshSorteos, showToast }){
  const [selectedId, setSelectedId] = useState(null);
  const [seedTargetAt, setSeedTargetAt] = useState(''); // datetime-local
  const [blockHeight, setBlockHeight] = useState('');
  const [busy, setBusy] = useState(false);
  const [foundBlock, setFoundBlock] = useState(null);
  const [searching, setSearching] = useState(false);
  const [autoPolling, setAutoPolling] = useState(false);
  const [pollMsg, setPollMsg] = useState('');
  const [latestTipInfo, setLatestTipInfo] = useState(null); // {height, timestamp}
  const [now, setNow] = useState(Date.now());
  useEffect(()=>{ const t = setInterval(()=>setNow(Date.now()), 1000); return ()=>clearInterval(t); },[]);

  const sorteo = sorteos.find(s => s.id === selectedId) || null;

  // Pre-llenar seed_target_at con end_date + 2 horas cuando se elige un sorteo, si tiene end_date.
  // (un par de horas después del cierre de compras, suficiente para que se mine al menos 1 bloque BTC)
  useEffect(()=>{
    if (sorteo && sorteo.lifecycleStatus === 'open' && sorteo.end && !seedTargetAt) {
      // sorteo.end es ahora un timestamptz ISO. Sumar 2hs y formatear como datetime-local Chile
      const endMs = new Date(sorteo.end).getTime();
      const targetMs = endMs + 2*60*60*1000;
      const target = new Date(targetMs);
      // Convertir a hora local Chile (timeZoneName: 'short' garantiza CLT/CLST)
      const fmt = new Intl.DateTimeFormat('en-CA', { timeZone:'America/Santiago', year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false });
      const parts = Object.fromEntries(fmt.formatToParts(target).filter(p=>p.type!=='literal').map(p=>[p.type,p.value]));
      setSeedTargetAt(`${parts.year}-${parts.month}-${parts.day}T${parts.hour==='24'?'00':parts.hour}:${parts.minute}`);
    }
  }, [sorteo?.id]);

  const endPassed = sorteo?.end && new Date(sorteo.end).getTime() < Date.now();

  async function handleFreeze(){
    if (!sorteo) return;
    if (!seedTargetAt) return showToast('Define la fecha/hora del seed', 'err');
    if (!confirm(`¿Freezear el sorteo "${sorteo.title}"? Esta acción es IRREVERSIBLE: la lista de números queda hasheada y publicada. No se aceptarán más compras después de este momento.`)) return;
    setBusy(true);
    try {
      const iso = new Date(seedTargetAt).toISOString();
      const res = await dbFreezeSorteo(sorteo.id, iso);
      showToast(`✓ Sorteo freezado. Hash: ${res.hash.slice(0,16)}... (${res.count} números)`);
      await refreshSorteos();
    } catch(e){ showToast('Error: '+e.message, 'err'); }
    setBusy(false);
  }
  async function handleExecute(){
    if (!sorteo) return;
    if (!blockHeight) return showToast('Ingresa el número de bloque BTC', 'err');
    if (!confirm(`¿Ejecutar sorteo "${sorteo.title}" con bloque BTC #${blockHeight}? Esta acción es IRREVERSIBLE y selecciona al ganador.`)) return;
    setBusy(true);
    try {
      const res = await dbExecuteSorteo(sorteo.id, parseInt(blockHeight));
      showToast(`✓ Ganador: número ${String(res.winner_numero).padStart(5,'0')}`);
      await refreshSorteos();
    } catch(e){ showToast('Error: '+e.message, 'err'); }
    setBusy(false);
  }
  async function handleAutoFindBlock(){
    if (!sorteo?.seedTargetAt) return showToast('No hay seed objetivo', 'err');
    setSearching(true); setFoundBlock(null); setAutoPolling(false);
    try {
      const targetMs = new Date(sorteo.seedTargetAt).getTime();
      const block = await findBlockAfter(targetMs);
      setFoundBlock(block);
      setBlockHeight(String(block.height));
      showToast(`✓ Bloque BTC #${block.height} encontrado`);
    } catch(e){
      // Si no hay bloque todavía, activar auto-polling
      if (e.message && e.message.includes('Aún no hay un bloque')) {
        setAutoPolling(true);
        setPollMsg('Aún no se mina un bloque BTC. Sondeo automático activo cada 30s.');
        showToast('🔄 Auto-sondeo activado. Te aviso apenas aparezca el bloque.');
      } else {
        showToast(e.message, 'err');
      }
    }
    setSearching(false);
  }

  // Auto-poll: cada 30 segundos intenta encontrar el bloque, se desactiva al encontrarlo o al cambiar de sorteo
  useEffect(()=>{
    if (!autoPolling || foundBlock || !sorteo?.seedTargetAt) return;
    let cancelled = false;
    const tryFind = async () => {
      if (cancelled) return;
      try {
        const targetMs = new Date(sorteo.seedTargetAt).getTime();
        const block = await findBlockAfter(targetMs);
        if (cancelled) return;
        setFoundBlock(block);
        setBlockHeight(String(block.height));
        setAutoPolling(false);
        setPollMsg('');
        showToast(`🎉 Bloque BTC #${block.height} encontrado automáticamente`);
        // Beep audible para alertar al admin
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const o = ctx.createOscillator(); const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination); o.frequency.value = 880; g.gain.value = 0.1;
          o.start(); setTimeout(()=>{ o.frequency.value = 1320; }, 150); setTimeout(()=>o.stop(), 350);
        } catch(_) {}
      } catch (e) {
        // Sigue esperando — actualizar mensaje si la API falla
        if (!cancelled) setPollMsg(`Aún no aparece. Reintentando cada 30s. (${new Date().toLocaleTimeString('es-CL')})`);
      }
    };
    tryFind();
    const iv = setInterval(tryFind, 30000);
    return () => { cancelled = true; clearInterval(iv); };
  }, [autoPolling, foundBlock, sorteo?.seedTargetAt]);

  // Refrescar el último bloque BTC conocido (tip) cada 60s — sirve para predecir el próximo bloque
  useEffect(()=>{
    if (sorteo?.lifecycleStatus !== 'frozen') return;
    let cancelled = false;
    const refreshTip = async () => {
      try {
        const r = await fetch('https://mempool.space/api/blocks/tip/height');
        if (!r.ok) return;
        const h = parseInt((await r.text()).trim());
        if (!h || cancelled) return;
        const r2 = await fetch(`https://mempool.space/api/block-height/${h}`);
        if (!r2.ok) return;
        const hash = (await r2.text()).trim();
        const r3 = await fetch(`https://mempool.space/api/block/${hash}`);
        if (!r3.ok) return;
        const meta = await r3.json();
        if (!cancelled) setLatestTipInfo({ height: meta.height, timestamp: meta.timestamp });
      } catch(_) {}
    };
    refreshTip();
    const iv = setInterval(refreshTip, 60000);
    return () => { cancelled = true; clearInterval(iv); };
  }, [sorteo?.lifecycleStatus]);

  return html`
    <div>
      <div class="mb-6">
        <div class="display text-3xl">EJECUTAR SORTEO</div>
        <div class="text-[10px] text-neutral-500 tracking-widest mt-1">VRF · BITCOIN BLOCK HASH · VERIFIABLE</div>
      </div>

      <div class="border border-white/10 rounded-2xl bg-black/40 p-5 mb-6">
        <div class="text-xs tracking-widest text-brand mb-3">SELECCIONAR SORTEO</div>
        <select value=${selectedId||''} onChange=${e=>{setSelectedId(+e.target.value || null); setSeedTargetAt(''); setBlockHeight(''); setFoundBlock(null); setAutoPolling(false); setPollMsg(''); setLatestTipInfo(null);}}
          class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-3 outline-none focus:border-brand">
          <option value="">— elige un sorteo —</option>
          ${sorteos.map(s => html`<option key=${s.id} value=${s.id}>${s.title} · ${s.lifecycleStatus.toUpperCase()}</option>`)}
        </select>
      </div>

      ${sorteo && html`
        <div class="border border-white/10 rounded-2xl bg-white/5 p-6">
          <!-- Indicador de fase -->
          <div class="flex gap-2 mb-6 text-xs tracking-widest">
            ${['open','frozen','completed'].map(st => html`
              <div key=${st} class=${"flex-1 text-center py-2 rounded-lg "+(sorteo.lifecycleStatus===st?'bg-brand text-black':sorteo.lifecycleStatus==='completed' || (sorteo.lifecycleStatus==='frozen' && st==='open')?'bg-green-900/40 text-green-400':'bg-white/5 text-neutral-500')}>
                ${st === 'open' ? '1 · ABIERTO' : st === 'frozen' ? '2 · FREEZADO' : '3 · COMPLETADO'}
              </div>
            `)}
          </div>

          ${sorteo.lifecycleStatus === 'open' && html`
            <div>
              ${sorteo.end && html`
                <div class="bg-brand/10 border border-brand/40 rounded-xl p-4 mb-5 text-sm">
                  <div class="text-[10px] tracking-widest text-brand mb-1">// CIERRE DE COMPRAS DE STICKERS</div>
                  <div class="text-white">${new Date(sorteo.end).toLocaleString('es-CL', { timeZone:'America/Santiago', weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' })} <span class="text-neutral-500 text-xs">(Chile)</span></div>
                  <div class="text-xs text-neutral-400 mt-1">${endPassed ? '✓ Las compras ya se cerraron automáticamente. Puedes freezear ahora.' : 'A esa hora exacta el sistema dejará de aceptar compras automáticamente.'}</div>
                </div>
              `}
              ${!sorteo.end && html`
                <div class="bg-yellow-900/30 border border-yellow-700/40 rounded-xl p-4 mb-5 text-sm">
                  <div class="text-yellow-400">⚠ Este sorteo no tiene fecha de cierre de compras definida.</div>

/* ============== Resultado Público (acta auditable) ============== */
function ResultadoPublico({ sorteoId, onClose }){
  const [data, setData] = useState(null);
  const [numeros, setNumeros] = useState(null);
  const [verifying, setVerifying] = useState(false);
  const [verifyResult, setVerifyResult] = useState(null);
  const [error, setError] = useState(null);

  useEffect(()=>{
    (async ()=>{
      try {
        const d = await dbFetchResultadoPublico(sorteoId);
        setData(d);
      } catch(e){ setError(e.message); }
    })();
  }, [sorteoId]);

  async function handleVerify(){
    if (!data) return;
    setVerifying(true); setVerifyResult(null);
    try {
      // 1) Bajar la lista de números y recalcular el hash
      const nums = await dbFetchNumerosPublicos(sorteoId);
      setNumeros(nums);
      const concat = nums.join(',');
      const buf = new TextEncoder().encode(concat);
      const hashBuf = await crypto.subtle.digest('SHA-256', buf);
      const recalcHash = Array.from(new Uint8Array(hashBuf)).map(b=>b.toString(16).padStart(2,'0')).join('');
      const hashOk = recalcHash === data.pre_commit_hash;
      // 2) Recalcular el HMAC con el seed
      const vrf = await verifyVRF(data.seed_value, data.pre_commit_hash, nums.length);
      const indexOk = vrf.winner_index === data.winner_index;
      const numeroOk = nums[vrf.winner_index] === data.winner_numero;
      setVerifyResult({ hashOk, indexOk, numeroOk, recalcHash, recalcHmac: vrf.hmac_hex, recalcIndex: vrf.winner_index });
    } catch(e){ setVerifyResult({ error: e.message }); }
    setVerifying(false);
  }

  if (error) return html`<div class="min-h-screen flex items-center justify-center text-center p-6"><div><div class="display text-4xl text-red-400 mb-3">Error</div><div class="text-neutral-400">${error}</div><button onClick=${onClose} class="mt-6 px-6 py-3 border border-white/20 rounded-full">Volver</button></div></div>`;
  if (!data) return html`<div class="min-h-screen flex items-center justify-center"><div class="text-neutral-500">Cargando...</div></div>`;

  return html`
    <section class="min-h-screen bg-neutral-950 text-white px-6 py-16 print:bg-white print:text-black">
      <div class="max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-10 print:hidden">
          <button onClick=${onClose} class="text-sm tracking-widest text-neutral-400 hover:text-brand">← VOLVER AL SITIO</button>
          <button onClick=${()=>window.print()} class="px-5 py-2 border border-white/20 hover:border-brand rounded-full text-sm tracking-widest">🖨️ IMPRIMIR / PDF</button>
        </div>

        <!-- Header -->
        <div class="text-center mb-10 border-b border-white/10 pb-8 print:border-black/20">
          <div class="inline-block bg-gradient-to-br from-brand to-yellow-400 text-black font-black px-6 py-2 rounded-full text-xs tracking-[0.3em] mb-4">CLAUDIO EN PISTA</div>
          <div class="text-xs tracking-[0.4em] text-brand">// ACTA PÚBLICA DE SORTEO</div>
          <h1 class="display text-5xl md:text-6xl mt-4 mb-2">${data.title}</h1>
          <div class="text-neutral-400 text-sm">Sorteo Nº ${data.sorteo_id}</div>
        </div>

        ${data.lifecycle_status !== 'completed' ? html`
          <div class="text-center py-20">
            <div class="display text-3xl text-neutral-500 mb-4">SORTEO ${data.lifecycle_status === 'open' ? 'EN CURSO' : 'PENDIENTE DE EJECUCIÓN'}</div>
            <div class="text-neutral-400 text-sm">Estado: <span class="text-brand">${data.lifecycle_status.toUpperCase()}</span></div>
            ${data.pre_commit_hash && html`<div class="mt-8 max-w-xl mx-auto bg-black/40 border border-white/10 rounded-xl p-5 text-left text-xs"><div class="text-neutral-500 mb-1">Pre-commit hash (lista hasheada):</div><div class="font-mono break-all text-brand">${data.pre_commit_hash}</div><div class="text-neutral-500 mt-3">Números emitidos: <span class="text-white">${data.pre_commit_count}</span></div></div>`}
          </div>
        ` : html`
          <!-- Ganador -->
          <div class="bg-gradient-to-br from-brand/20 via-black/40 to-black/40 border-2 border-brand rounded-3xl p-10 text-center mb-12 print:bg-orange-50 print:border-orange-500">
            <div class="text-6xl mb-2">🏆</div>
            <div class="text-xs tracking-[0.4em] text-brand mb-4">// GANADOR</div>
            <div class="display text-7xl md:text-8xl text-brand font-mono mb-4 print:text-orange-600">${String(data.winner_numero).padStart(5,'0')}</div>
            <div class="text-xl text-neutral-300 print:text-black">${data.winner_display_name || 'Anónimo'}</div>
            <div class="text-sm text-neutral-500 mt-1 font-mono print:text-gray-700">${data.winner_display_email || ''}</div>
            <div class="text-xs text-neutral-500 mt-6 tracking-widest">${new Date(data.completed_at).toLocaleString('es-CL', { timeZone: 'America/Santiago', dateStyle:'long', timeStyle:'short' })} CLT</div>
          </div>

          <!-- Procedimiento -->
          <div class="bg-black/40 border border-white/10 rounded-2xl p-8 mb-8 print:bg-gray-50 print:border-gray-300">
            <h2 class="display text-2xl mb-4 text-brand print:text-orange-600">// PROCEDIMIENTO VRF (Verifiable Random Function)</h2>
            <ol class="space-y-4 text-sm leading-relaxed text-neutral-300 print:text-black">
              <li><strong class="text-white print:text-black">1. Pre-commit (freeze):</strong> el ${new Date(data.pre_commit_at).toLocaleString('es-CL')} se hasheó la lista completa de <strong>${data.pre_commit_count}</strong> números emitidos en orden ascendente, separados por coma. SHA-256 result:<br/><code class="font-mono text-xs text-brand break-all block mt-2">${data.pre_commit_hash}</code></li>
              <li><strong class="text-white print:text-black">2. Seed público e impredecible:</strong> hash del bloque de Bitcoin <strong>#${data.seed_metadata?.block_height}</strong> minado el ${data.seed_metadata?.block_time ? new Date(data.seed_metadata.block_time*1000).toLocaleString('es-CL') : ''} (verificable en <a href=${`https://mempool.space/block/${data.seed_value}`} target="_blank" class="text-brand underline">mempool.space</a>):<br/><code class="font-mono text-xs text-brand break-all block mt-2">${data.seed_value}</code></li>
              <li><strong class="text-white print:text-black">3. Cálculo determinístico del ganador:</strong><br/><code class="font-mono text-xs block mt-2 text-neutral-300 print:text-black">índice = HMAC-SHA256(seed, hash_pre_commit) mod ${data.pre_commit_count}</code><br/>Resultado: <strong class="text-brand">índice = ${data.winner_index}</strong> → número en posición ${data.winner_index} de la lista ordenada ascendentemente = <strong class="text-brand font-mono">${String(data.winner_numero).padStart(5,'0')}</strong></li>
            </ol>
          </div>

          <!-- Verificación independiente -->
          <div class="bg-black/40 border border-white/10 rounded-2xl p-8 mb-8 print:hidden">
            <h2 class="display text-2xl mb-4 text-brand">// VERIFICACIÓN INDEPENDIENTE</h2>
            <p class="text-sm text-neutral-400 mb-5 leading-relaxed">Cualquier persona puede verificar este resultado clickeando el botón. El navegador descarga la lista de números desde la API pública, recalcula los hashes y el HMAC, y compara con los valores oficiales. <strong class="text-brand">Si todo coincide, el sorteo es matemáticamente válido.</strong></p>
            <button onClick=${handleVerify} disabled=${verifying} class="px-6 py-3 bg-brand text-black display tracking-widest rounded-full hover-glow disabled:opacity-40">${verifying?'Verificando...':'🔍 VERIFICAR AHORA'}</button>
            ${verifyResult && (verifyResult.error ? html`<div class="mt-4 text-red-400 text-sm">Error: ${verifyResult.error}</div>` : html`
              <div class="mt-5 space-y-2 text-sm font-mono">
                <div class=${verifyResult.hashOk?'text-green-400':'text-red-400'}>${verifyResult.hashOk?'✓':'✗'} Hash pre-commit recalculado coincide</div>
                <div class=${verifyResult.indexOk?'text-green-400':'text-red-400'}>${verifyResult.indexOk?'✓':'✗'} Índice del ganador (${verifyResult.recalcIndex}) coincide</div>
                <div class=${verifyResult.numeroOk?'text-green-400':'text-red-400'}>${verifyResult.numeroOk?'✓':'✗'} Número ganador coincide</div>
                ${verifyResult.hashOk && verifyResult.indexOk && verifyResult.numeroOk && html`<div class="mt-3 px-4 py-2 bg-green-900/40 text-green-300 rounded-lg display tracking-widest text-center">✓ SORTEO MATEMÁTICAMENTE VÁLIDO</div>`}
              </div>
            `)}
          </div>
        `}

        <!-- Footer -->
        <div class="mt-12 pt-8 border-t border-white/10 text-center text-xs text-neutral-500 print:text-black print:border-black/20">
          © 2026 Claudio en Pista · @claudioenpista · Acta auditable generada por sistema VRF propio
        </div>
      </div>
    </section>
  `;
}

function Admin({ open, close, sorteos, stickersList,

  const [compras,setCompras] = useState([]);

  const [revenueRows,setRevenueRows] = useState([]);
  const [revenueBusy,setRevenueBusy] = useState(false);

  // verificar sesion al abrir
  useEffect(()=>{
    if (!open) return;
    (async ()=>{
      const u = await dbCurrentAdmin();
      setUser(u);
    })();
  }, [open]);

  // cargar compras al entrar a la seccion participantes
  useEffect(()=>{
    if (!user || section !== 'participantes') return;
    setComprasBusy(true);
    dbFetchComprasAdmin().then(d => setCompras(d)).catch(e=>alert('Error cargando compras: '+e.message)).finally(()=>setComprasBusy(false));
  }, [user, section]);

  function exportComprasCSV(){
    const rows = [['compra_id','fecha','nombre','email','rut','telefono','sorteo','monto_clp','status','numeros'].join(',')];
    for (const c of compras){
      const row = [
        c.compra_id, c.created_at, c.name||'', c.email||'', c.rut||'', c.phone||'',
        (c.sorteo_title||'').replace(/,/g,';'), c.monto_total||0, c.status||'',
        '"'+((c.numeros||[]).map(n=>String(n).padStart(5,'0')).join(' '))+'"'
      ];
      rows.push(row.join(','));
    }
    const blob = new Blob([rows.join('\n')], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `compras-${new Date().toISOString().slice(0,10)}.csv`; a.click();
    URL.revokeObjectURL(url);
  }

  async function handleSignIn(){
    setAuthBusy(true); setAuthMsg('');
    try { const u = await dbAdminSignIn(email.trim(), pw); setUser(u); setPw(''); setAuthMsg(''); }
    catch(e){ setAuthMsg(e.message || 'Error de login'); }
    setAuthBusy(false);
  }
  async function handleSignUp(){
    setAuthBusy(true); setAuthMsg('');
    try {
      await dbAdminSignUp(email.trim(), pw);
      setAuthMsg('Cuenta creada. Pídele al super admin que te autorice (te tiene que agregar a la tabla admins). Después puedes hacer login.');
      setAuthMode('signin'); setPw('');
    }
    catch(e){ setAuthMsg(e.message || 'Error al crear cuenta'); }
    setAuthBusy(false);
  }
  async function handleSignOut(){
    await dbAdminSignOut(); setUser(null);
  }

  // helpers para listas anidadas (heroCards, prizes, bases)
  function patchNested(idx, listKey, subIdx, patch){
    const list = [...(sorteos[idx][listKey] || [])];
    list[subIdx] = { ...list[subIdx], ...patch };
    patchSorteoLocal(idx, { [listKey]: list });
  }
  function appendToList(idx, listKey, item){
    const list = [...(sorteos[idx][listKey] || []), item];
    patchSorteoLocal(idx, { [listKey]: list });
  }
  function removeFromList(idx, listKey, subIdx){
    const list = [...(sorteos[idx][listKey] || [])];
    list.splice(subIdx, 1);
    patchSorteoLocal(idx, { [listKey]: list });
  }
  const [pdfName,setPdfName] = useState('bases-f1-brasil-2026.pdf');

  return html`
    <${AnimatePresence}>
      ${open && html`
        <${motion.div} initial=${{opacity:0}} animate=${{opacity:1}} exit=${{opacity:0}}
          data-lenis-prevent class="fixed inset-0 z-[60] bg-black/95 backdrop-blur overflow-y-auto overscroll-contain">

            <div class="flex items-center justify-between mb-10 flex-wrap gap-4">

                <h2 class="display text-5xl md:text-7xl mt-2">ADMIN <span class="text-brand">CEP</span></h2>
                ${user && html`<div class="text-xs text-neutral-500 mt-2">${user.email} · <button onClick=${handleSignOut} class="text-brand hover:underline">cerrar sesión</button></div>`}

                  ${section==='ruleta' && html`<${SorteoVRFAdmin} sorteos=${sorteos} refreshSorteos=${refreshSorteos} showToast=${showToast}/>`}

}

const LS_KEY_SORTEOS = 'cep:sorteos:v1';
const LS_KEY_STICKERS = 'cep:stickers:v1';
function lsLoad(key, fallback){
  try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch(e){ console.warn('lsLoad failed', key, e); return fallback; }
}
function lsSave(key, value){
  try { localStorage.setItem(key, JSON.stringify(value)); }
  catch(e){ console.warn('lsSave failed', key, e); }
}

const DEFAULT_STICKERS = STICKERS.map(s=>({...s,sorteoId:1}));
function migrateSorteos(arr){
  if (!Array.isArray(arr) || arr.length === 0) return DEFAULT_SORTEOS;
  const fb = DEFAULT_SORTEOS[0];
  return arr.map(s => ({
    id: s.id || Date.now(),
    title: s.title || 'Sorteo',
    prize: s.prize || '',
    start: s.start || '',
    end: s.end || '',
    active: !!s.active,
    status: s.status || 'activo',
    heroCards: Array.isArray(s.heroCards) && s.heroCards.length ? s.heroCards : fb.heroCards,
    prizes:    Array.isArray(s.prizes)    && s.prizes.length    ? s.prizes    : fb.prizes,
    bases:     Array.isArray(s.bases)     && s.bases.length     ? s.bases     : fb.bases,
  }));
}

function App(){
  const [tab,setTab] = useState('home');
  const [cart,setCart] = useState({});
  const [cartOpen,setCartOpen] = useState(false);
  const [adminOpen,setAdminOpen] = useState(false);
  const [checkoutResult,setCheckoutResult] = useState(null); // 'ok' | 'cancel' | null
  const [checkoutCompraId,setCheckoutCompraId] = useState(null);
  const [resultadoId,setResultadoId] = useState(()=>{
    const p = new URLSearchParams(window.location.search);
    const id = p.get('resultado');
    return id ? parseInt(id) : null;
  });
  const [toasts,setToasts] = useState([]); // [{id, msg, type}]
  const [busyKeys,setBusyKeys] = useState(new Set());

  function showToast(msg, type='ok'){
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, msg, type }]);
    setTimeout(()=>setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  }
  function setBusy(key, busy){
    setBusyKeys(prev => { const n = new Set(prev); if (busy) n.add(key); else n.delete(key); return n; });
  }
  const isBusy = (key) => busyKeys.has(key);

  // Detectar retorno de Stripe Checkout via query params
  useEffect(()=>{
    const p = new URLSearchParams(window.location.search);
    const result = p.get('checkout');
    const compraId = p.get('compra');
    if (result === 'ok' || result === 'cancel'){
      setCheckoutResult(result);
      setCheckoutCompraId(compraId);
      // limpiar URL para no re-mostrar al recargar
      const url = new URL(window.location.href);
      url.searchParams.delete('checkout');
      url.searchParams.delete('compra');
      url.searchParams.delete('session');
      window.history.replaceState({}, '', url.toString());
    }
  }, []);

  // Capturar ref de vendedor desde URL ?ref=<slug> y guardar en sessionStorage (sólo sesión actual)
  useEffect(()=>{
    const p = new URLSearchParams(window.location.search);
    const ref = (p.get('ref') || '').trim().toLowerCase();
    if (ref && /^[a-z0-9][a-z0-9-]{1,38}[a-z0-9]$/.test(ref)) {
      try {
        sessionStorage.setItem('cep:vendedor_slug', ref);
      } catch(_) {}
      // limpiar URL pero mantener ref activo en session
      const url = new URL(window.location.href);
      url.searchParams.delete('ref');
      window.history.replaceState({}, '', url.toString());
    }
  }, []);
  // state arranca con cache de localStorage para render inmediato; despues hidrata del DB
  const [sorteos,setSorteos] = useState(() => migrateSorteos(lsLoad(LS_KEY_SORTEOS, DEFAULT_SORTEOS)));
  const [stickersList,setStickersList] = useState(() => {
    const loaded = lsLoad(LS_KEY_STICKERS, DEFAULT_STICKERS);
    return Array.isArray(loaded) && loaded.length ? loaded : DEFAULT_STICKERS;
  });
  const [dbReady,setDbReady] = useState(false);
  const [dbError,setDbError] = useState(null);

  // hidratar del DB al montar
  useEffect(()=>{
    let cancelled = false;
    (async ()=>{
      try {
        const [s, st] = await Promise.all([dbFetchSorteos(), dbFetchStickers()]);
        if (cancelled) return;
        if (s.length) setSorteos(s);
        if (st.length) setStickersList(st);
        setDbReady(true);
      } catch(e){
        console.warn('DB hydration failed, using localStorage cache', e);
        if (!cancelled) setDbError(e.message || String(e));
      }
    })();
    return ()=>{ cancelled = true; };
  }, []);

  // cache persistente en localStorage como fallback offline
  useEffect(()=>{ lsSave(LS_KEY_SORTEOS, sorteos); }, [sorteos]);
  useEffect(()=>{ lsSave(LS_KEY_STICKERS, stickersList); }, [stickersList]);

  // ====== mutaciones admin (DB + state) ======
  async function refreshSorteos(){
    try { setSorteos(await dbFetchSorteos()); showToast('✓ Sorteos recargados'); }
    catch(e){ showToast('Error al recargar sorteos: '+e.message, 'err'); }
  }
  async function refreshStickers(){
    try { setStickersList(await dbFetchStickers()); showToast('✓ Stickers recargados'); }
    catch(e){ showToast('Error al recargar stickers: '+e.message, 'err'); }
  }
  function patchSorteoLocal(idx, patch){
    setSorteos(prev => prev.map((s,i)=> i===idx ? {...s, ...patch} : s));
  }
  function patchStickerLocal(idx, patch){
    setStickersList(prev => prev.map((s,i)=> i===idx ? {...s, ...patch} : s));
  }
  async function saveSorteoAt(idx){
    const s = sorteos[idx]; if (!s) return;
    const key = 'sorteo:'+(s.id||'new'); setBusy(key, true);
    try {
      const saved = await dbUpsertSorteo(s);
      setSorteos(prev => prev.map((x,i)=> i===idx ? saved : x));
      showToast(`✓ Sorteo "${saved.title}" guardado`);
    } catch(e){ showToast('Error al guardar: '+e.message, 'err'); }
    setBusy(key, false);
  }
  async function addSorteo(){
    setBusy('sorteo-add', true);
    const tpl = {
      title:'Nuevo sorteo', prize:'', start:'', end:'', active:false, status:'activo',

  const cartCount = Object.values(cart).reduce((a,b)=>a+b,0);

  const goto = t => { ScrollTrigger.getAll().forEach(st=>st.kill()); lenis.stop(); setTab(t); setTimeout(()=>{window.scrollTo({top:0,behavior:'instant'});lenis.start();},50); };

          <${motion.div} key=${t.id}
            initial=${{opacity:0, y:20, scale:.9}} animate=${{opacity:1, y:0, scale:1}} exit=${{opacity:0, y:-10, scale:.95}}
            transition=${{type:'spring', stiffness:400, damping:25}}
            class=${"fixed left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full backdrop-blur-md border display tracking-widest text-sm shadow-2xl "+(t.type==='err'?'bg-red-950/80 border-red-500/60 text-red-200':'bg-green-950/80 border-green-500/60 text-green-100')}
            style=${{ top: `${20 + toasts.indexOf(t)*60}px` }}>
            ${t.msg}
          </${motion.div}>
        `)}
      </${AnimatePresence}>
    </${React.Fragment}>
  `;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
